<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moment Of Truth — Improved</title>
  <style>
    :root {
  --mot-bg: #06111f;
  --mot-bg-deep: #030814;
  --mot-panel: rgba(10, 19, 35, 0.74);
  --mot-panel-2: rgba(14, 27, 49, 0.9);
  --mot-panel-solid: #0f1b31;
  --mot-text: #f5fbff;
  --mot-muted: #90a6c3;

  --mot-accent: #59f3b2;
  --mot-accent-2: #49d8ff;
  --mot-accent-3: #ffd76a;

  --mot-danger: #ff5f7a;
  --mot-warning: #ffb84d;
  --mot-correct: #39d98a;
  --mot-wrong: #ff5f7a;

  --mot-border: rgba(125, 211, 252, 0.16);
  --mot-grid: rgba(73, 216, 255, 0.05);
  --mot-shadow: 0 18px 50px rgba(0, 0, 0, 0.42);

  --mot-radius: 20px;

  --mot-font: "Inter", "Segoe UI", system-ui, sans-serif;
  --mot-title-font: var(--mot-font);

  --mot-answer-font-size: clamp(14px, 2vw, 18px);
  --mot-question-font-size: clamp(18px, 2.2vw, 28px);
  --mot-hud-font-size: clamp(12px, 1.3vw, 14px);

  --mot-indicator-size: 34px;
  --mot-rail-height: 18px;
  --mot-band-height: 92px;

  --mot-anim-fast: 160ms;
  --mot-anim-mid: 280ms;
  --mot-anim-slow: 500ms;
}


    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: var(--mot-font);
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

   .mot-root {
  width: 100vw;
  height: 100vh;
  max-width: 100vw;
  max-height: 100vh;
  color: var(--mot-text);
  background:
    radial-gradient(circle at 12% 18%, rgba(73,216,255,0.20), transparent 28%),
    radial-gradient(circle at 85% 14%, rgba(89,243,178,0.18), transparent 24%),
    radial-gradient(circle at 50% 100%, rgba(255,215,106,0.10), transparent 30%),
    linear-gradient(180deg, #07101d 0%, #050a14 55%, #03070f 100%);
  overflow: hidden;
  position: relative;
  isolation: isolate;
}

.mot-root::before {
  content: "";
  position: absolute;
  inset: -10%;
  background:
    radial-gradient(circle at 20% 20%, rgba(73,216,255,0.16), transparent 20%),
    radial-gradient(circle at 78% 24%, rgba(89,243,178,0.14), transparent 18%),
    radial-gradient(circle at 60% 70%, rgba(255,215,106,0.08), transparent 16%);
  filter: blur(34px);
  opacity: 0.95;
  animation: motAuroraDrift 14s ease-in-out infinite alternate;
  pointer-events: none;
}

.mot-root::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(73,216,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(73,216,255,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  opacity: 0.28;
  pointer-events: none;
}

@keyframes motAuroraDrift {
  0% {
    transform: translate3d(-2%, 0, 0) scale(1);
  }
  50% {
    transform: translate3d(2%, -1%, 0) scale(1.04);
  }
  100% {
    transform: translate3d(0, 2%, 0) scale(1.08);
  }
}


    .mot-shell {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      padding: 18px;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

.mot-panel {
  position: relative;
  min-height: 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(19,32,58,0.82), rgba(8,15,28,0.82)),
    linear-gradient(135deg, rgba(73,216,255,0.08), rgba(89,243,178,0.04) 45%, rgba(255,215,106,0.03));
  border: 1px solid rgba(130, 195, 255, 0.14);
  border-radius: var(--mot-radius);
  box-shadow:
    var(--mot-shadow),
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(73,216,255,0.04);
  backdrop-filter: blur(14px) saturate(130%);
}

.mot-panel::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 1px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(73,216,255,0.50),
    rgba(89,243,178,0.35),
    transparent
  );
  opacity: 0.9;
  pointer-events: none;
}


    .mot-hud {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      font-size: var(--mot-hud-font-size);
      flex-shrink: 0;
    }

    .mot-stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px 12px;
      min-width: 0;
      transition: transform var(--mot-anim-fast) ease, border-color var(--mot-anim-fast) ease, box-shadow var(--mot-anim-fast) ease;
    }

    .mot-stat--highlight {
      border-color: rgba(56,189,248,0.32);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.07);
    }

    .mot-stat--danger {
      border-color: rgba(239,68,68,0.45);
      box-shadow: 0 0 0 4px rgba(239,68,68,0.10), 0 0 24px rgba(239,68,68,0.08);
      animation: motDangerPulse 1.2s ease-in-out infinite;
    }

    @keyframes motDangerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .mot-stat__label {
      color: var(--mot-muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .mot-stat__value {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mot-score-counting {
      color: #fde68a;
      text-shadow: 0 0 14px rgba(245,158,11,0.24);
    }

    .mot-progress { padding: 14px 16px 18px; flex-shrink: 0; }
    .mot-progress__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .mot-progress__title { font-weight: 700; font-size: 15px; }
    .mot-progress__meta { color: var(--mot-muted); font-size: 13px; }

    .mot-track {
      position: relative;
      height: 42px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        linear-gradient(90deg, #0f172a, #172033);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .mot-track__fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(34,197,94,0.45), rgba(56,189,248,0.45));
      transition: width var(--mot-anim-slow) ease;
      z-index: 1;
    }
    .mot-track__ticks {
      position: absolute;
      inset: 0;
      display: grid;
      z-index: 2;
      pointer-events: none;
    }
    .mot-track__tick { border-right: 1px solid rgba(255,255,255,0.06); }
    .mot-track__tick:last-child { border-right: none; }
    .mot-track__runner {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      font-size: 28px;
      line-height: 1;
      transition: left var(--mot-anim-slow) ease;
      pointer-events: none;
      z-index: 4;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.28));
    }
    .mot-track__finish {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      z-index: 3;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
    }

.mot-main {
  position: relative;
  display: grid;
  grid-template-rows: auto auto auto auto auto;
  gap: 16px;
  padding: 18px;
  min-height: 0;
  height: 100%;
  overflow: hidden;
  align-content: start;
  border-radius: calc(var(--mot-radius) + 6px);
  background:
    radial-gradient(circle at 50% 18%, rgba(73,216,255,0.12), transparent 28%),
    radial-gradient(circle at 50% 68%, rgba(89,243,178,0.08), transparent 34%),
    linear-gradient(180deg, rgba(10,20,38,0.82), rgba(6,11,22,0.92));
  border: 1px solid rgba(95, 170, 255, 0.14);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    inset 0 0 90px rgba(73,216,255,0.04);
}

.mot-main::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(73,216,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(73,216,255,0.025) 1px, transparent 1px);
  background-size: 54px 54px;
  opacity: 0.45;
  pointer-events: none;
}

.mot-main::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 34%;
  width: 62%;
  height: 220px;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(73,216,255,0.12), transparent 68%);
  filter: blur(24px);
  opacity: 0.9;
  pointer-events: none;
}


.mot-question {
  position: relative;
  padding: 18px 90px 18px 24px;
  line-height: 1.35;
  font-size: var(--mot-question-font-size);
  font-weight: 800;
  text-align: center;
  min-height: 112px;
  height: 132px;
  max-height: 132px;
  display: grid;
  place-items: center;
  overflow: hidden;
  border-radius: 24px;
  color: var(--mot-text);
  background:
    radial-gradient(circle at 50% 50%, rgba(73,216,255,0.12), transparent 58%),
    linear-gradient(180deg, rgba(18,33,60,0.92), rgba(7,15,28,0.94));
  border: 1px solid rgba(95, 180, 255, 0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    inset 0 0 40px rgba(73,216,255,0.05),
    0 0 0 1px rgba(73,216,255,0.04);
}

.mot-question::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, transparent, rgba(73,216,255,0.06), transparent);
  transform: translateX(-100%);
  animation: motQuestionSweep 4.8s linear infinite;
  pointer-events: none;
}

@keyframes motQuestionSweep {
  0% {
    transform: translateX(-100%);
  }
  100% {
    transform: translateX(100%);
  }
}


 .mot-question--boss::after,
.mot-question--speed::after,
.mot-question--safe::after,
.mot-question--double::after {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.12em;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(8, 16, 31, 0.78);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
  text-transform: uppercase;
}

.mot-question--boss::after {
  content: 'BOSS';
  color: #ff8ca1;
  border-color: rgba(255,95,122,0.38);
  box-shadow: 0 0 18px rgba(255,95,122,0.16);
}

.mot-question--speed::after {
  content: 'SPEED';
  color: #ffe27a;
  border-color: rgba(255,215,106,0.34);
  box-shadow: 0 0 18px rgba(255,215,106,0.14);
}

.mot-question--safe::after {
  content: 'SAFE';
  color: #8fe9ff;
  border-color: rgba(73,216,255,0.34);
  box-shadow: 0 0 18px rgba(73,216,255,0.14);
}

.mot-question--double::after {
  content: 'x2 STEP';
  color: #86ffcb;
  border-color: rgba(89,243,178,0.34);
  box-shadow: 0 0 18px rgba(89,243,178,0.14);
}


    .mot-question__inner {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      width: 100%;
    }

  .mot-rail-wrap {
  position: relative;
  padding: 8px 16px 0;
  flex-shrink: 0;
}
.mot-rail-wrap::before {
  content: "";
  position: absolute;
  left: 4%;
  right: 4%;
  top: 18px;
  height: 34px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(73,216,255,0.14), transparent 72%);
  filter: blur(18px);
  pointer-events: none;
}

.mot-rail {
  position: relative;
  width: 100%;
  height: var(--mot-rail-height);
  border-radius: 999px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
    linear-gradient(90deg, rgba(42,58,83,0.96), rgba(71,89,117,0.92));
  border: 1px solid rgba(152,201,255,0.16);
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 0 24px rgba(73,216,255,0.10);
}

.mot-rail::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
  opacity: 0.75;
  pointer-events: none;
}

    }
    .mot-rail__segments {
      position: absolute;
      inset: 0;
      display: grid;
      pointer-events: none;
    }
    .mot-rail__segment { border-right: 1px solid rgba(255,255,255,0.05); opacity: 0.18; position: relative; }
    .mot-rail__segment:last-child { border-right: none; }
    .mot-rail--hide-borders .mot-rail__segment { border-right-color: transparent; }
    .mot-rail__segment--correct { background: rgba(34,197,94,0.35); opacity: 1; }
    .mot-rail__segment--wrong { background: rgba(239,68,68,0.35); opacity: 1; }
    

    .mot-indicator {
      position: absolute;
      top: 50%;
      left: 0;
      width: var(--mot-indicator-size);
      height: var(--mot-indicator-size);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      font-size: 30px;
      line-height: 1;
      transition: filter var(--mot-anim-fast) ease, transform var(--mot-anim-fast) ease;
      z-index: 6;
      pointer-events: none;
      will-change: left;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.28));
    }

    .mot-indicator__inner {
      transform-origin: center;
      animation: motRunBob 0.6s ease-in-out infinite;
    }

    .mot-indicator--frozen {
      filter: drop-shadow(0 0 12px rgba(56,189,248,0.75)) drop-shadow(0 0 28px rgba(56,189,248,0.35));
      transform: translate(-50%, -50%) scale(1.06);
    }
    .mot-indicator--frozen .mot-indicator__inner { animation: none; }

    @keyframes motRunBob {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-2px) rotate(2deg); }
    }

    .mot-answer-band-wrap { padding: 0 16px 12px; flex-shrink: 0; }
   .mot-answer-band {
  position: relative;
  height: var(--mot-band-height);
  min-height: var(--mot-band-height);
  max-height: var(--mot-band-height);
  border-radius: 24px;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 0%, rgba(73,216,255,0.08), transparent 55%),
    linear-gradient(180deg, rgba(28,39,63,0.92), rgba(16,24,41,0.95));
  border: 1px solid rgba(140, 195, 255, 0.14);
  display: grid;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 0 30px rgba(73,216,255,0.06);
}

.mot-answer-band::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(73,216,255,0.05), transparent);
  pointer-events: none;
}

    .mot-answer-band__cell {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.05);
      font-size: var(--mot-answer-font-size);
      font-weight: 600;
      line-height: 1.25;
      transition: opacity var(--mot-anim-mid) ease, background var(--mot-anim-mid) ease, color var(--mot-anim-mid) ease, transform var(--mot-anim-fast) ease;
      word-break: break-word;
      overflow-wrap: anywhere;
      overflow: hidden;
      min-width: 0;
    }
    .mot-answer-band__cell:last-child { border-right: none; }
    .mot-answer-band--hide-borders .mot-answer-band__cell { border-right-color: transparent; }
    .mot-answer-band__cell--hidden { opacity: 0.12; color: transparent; text-shadow: none; }
    .mot-answer-band__cell--correct { background: rgba(22,163,74,0.24); }
    .mot-answer-band__cell--wrong { background: rgba(220,38,38,0.24); }
    .mot-answer-band__cell--perfect {
      background: linear-gradient(180deg, rgba(250,204,21,0.30), rgba(250,204,21,0.18));
      box-shadow: inset 0 0 0 1px rgba(250,204,21,0.24);
    }

    .mot-controls-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      margin-top: 8px;
      min-height: 56px;
      flex-shrink: 0;
    }

    .mot-bonuses { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; min-height: 48px; }
    .mot-energy {
      min-width: 220px;
      display: grid;
      gap: 6px;
      align-self: center;
    }
    .mot-energy__meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--mot-muted);
    }
    .mot-energy__bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .mot-energy__fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(56,189,248,0.75), rgba(34,197,94,0.75));
      transition: width var(--mot-anim-mid) ease;
    }

    .mot-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      color: var(--mot-text);
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--mot-anim-fast) ease, opacity var(--mot-anim-fast) ease, border-color var(--mot-anim-fast) ease, box-shadow var(--mot-anim-fast) ease;
      min-height: 48px;
    }
    .mot-btn:hover:not(:disabled) { transform: translateY(-1px); border-color: rgba(255,255,255,0.22); }
    .mot-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .mot-btn--stop {
      min-width: 180px;
      background: linear-gradient(180deg, rgba(239,68,68,0.22), rgba(220,38,38,0.18));
      border-color: rgba(239,68,68,0.28);
      font-size: 18px;
      letter-spacing: 0.04em;
    }
    .mot-btn--bonus { font-size: 14px; }
    .mot-btn--bonus-ready {
      border-color: rgba(56,189,248,0.44);
      box-shadow: 0 0 0 4px rgba(56,189,248,0.10);
    }
    .mot-btn--freeze-active {
      border-color: rgba(56,189,248,0.8);
      box-shadow: 0 0 0 4px rgba(56,189,248,0.20), 0 0 20px rgba(56,189,248,0.20);
      background: linear-gradient(180deg, rgba(56,189,248,0.24), rgba(2,132,199,0.16));
    }

    .mot-feedback {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 0 4px 2px;
      min-height: 58px;
      height: 58px;
      max-height: 58px;
      flex-shrink: 0;
    }
    .mot-banner {
      height: 58px;
      min-height: 58px;
      max-height: 58px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      font-weight: 700;
      font-size: 15px;
      transition: opacity var(--mot-anim-mid) ease, transform var(--mot-anim-mid) ease;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .mot-banner--correct { color: #bbf7d0; background: rgba(22,163,74,0.18); border-color: rgba(34,197,94,0.24); }
    .mot-banner--wrong { color: #fecaca; background: rgba(220,38,38,0.18); border-color: rgba(239,68,68,0.24); }
    .mot-banner--info { color: #bae6fd; background: rgba(2,132,199,0.14); border-color: rgba(56,189,248,0.22); }
    .mot-banner--perfect { color: #fde68a; background: rgba(250,204,21,0.16); border-color: rgba(250,204,21,0.28); }

    .mot-timer { min-width: 168px; height: 58px; display: flex; align-items: center; justify-content: flex-end; }
    .mot-timer__pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      color: #e0f2fe;
      background: rgba(56,189,248,0.16);
      border: 1px solid rgba(56,189,248,0.34);
      box-shadow: 0 0 0 0 rgba(56,189,248,0.3);
      opacity: 0;
      transform: scale(0.96);
      transition: opacity var(--mot-anim-fast) ease, transform var(--mot-anim-fast) ease;
      pointer-events: none;
    }
    .mot-timer__pill--visible {
      opacity: 1;
      transform: scale(1);
      animation: motFreezePulse 1s ease-in-out infinite;
    }
    @keyframes motFreezePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(56,189,248,0.22); }
      50% { box-shadow: 0 0 0 8px rgba(56,189,248,0.06); }
    }

    .mot-toast-layer {
      position: absolute;
      top: 18px;
      right: 18px;
      display: grid;
      gap: 10px;
      z-index: 55;
      pointer-events: none;
    }
    .mot-toast {
      min-width: 220px;
      max-width: 320px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15,23,42,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--mot-shadow);
      transform: translateY(-8px);
      opacity: 0;
      animation: motToastIn 320ms ease forwards;
    }
    .mot-toast--achievement { border-color: rgba(250,204,21,0.35); }
    .mot-toast--perfect { border-color: rgba(56,189,248,0.35); }
    .mot-toast__title { font-size: 13px; color: var(--mot-muted); margin-bottom: 4px; }
    .mot-toast__text { font-weight: 800; font-size: 15px; }
    @keyframes motToastIn {
      to { transform: translateY(0); opacity: 1; }
    }
    .mot-toast--out { animation: motToastOut 260ms ease forwards; }
    @keyframes motToastOut {
      to { transform: translateY(-8px); opacity: 0; }
    }

    .mot-perfect-burst {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%) scale(0.8);
      font-size: clamp(28px, 6vw, 56px);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: #fde68a;
      text-shadow: 0 0 24px rgba(250,204,21,0.28);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
    }
    .mot-perfect-burst--show { animation: motPerfectBurst 800ms ease forwards; }
    @keyframes motPerfectBurst {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
      12% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
      75% { opacity: 1; transform: translate(-50%, -52%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -58%) scale(0.95); }
    }

    .mot-shake { animation: motShake 420ms ease; }
    @keyframes motShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(4px); }
    }

    .mot-final {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      background: rgba(2,6,23,0.72);
      backdrop-filter: blur(8px);
      padding: 20px;
    }
    .mot-final--visible { display: grid; }
    .mot-final__card {
      width: min(100%, 720px);
      padding: 26px;
      border-radius: 24px;
      background: linear-gradient(180deg, #101827, #172033);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--mot-shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .mot-final__title { font-size: clamp(26px, 4vw, 40px); font-weight: 800; margin-bottom: 10px; }
    .mot-final__subtitle { color: var(--mot-muted); margin-bottom: 18px; }
    .mot-final__stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 20px 0 22px;
    }
    .mot-final__stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px 10px;
    }
    .mot-final__stat-value { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .mot-final__stat-label { color: var(--mot-muted); font-size: 13px; }
    .mot-final__actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .mot-confetti-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .mot-confetti {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 18px;
      border-radius: 2px;
      opacity: 0.9;
      animation: motConfettiFall linear forwards;
    }
    @keyframes motConfettiFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 1;
      }
    }

    @media (max-width: 980px) {
      .mot-hud { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .mot-final__stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 820px) {
      .mot-shell { padding: 12px; gap: 12px; }
      .mot-hud { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .mot-controls-row { grid-template-columns: 1fr; }
      .mot-feedback {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 102px;
        max-height: none;
      }
      .mot-banner { white-space: normal; height: auto; min-height: 58px; max-height: none; }
      .mot-timer { justify-content: flex-start; height: auto; }
      .mot-final__stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 520px) {
      .mot-hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .mot-question { height: 108px; max-height: 108px; }
      .mot-answer-band__cell { padding: 10px 8px; font-size: 13px; }
      .mot-btn--stop { width: 100%; }
      .mot-energy { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div id="moment-of-truth-root"></div>

  <script>
    (function () {
      'use strict';

      const DEFAULT_CONFIG = {
        content: { title: 'Moment Of Truth' },
        gameplay: {
          lives: 3,
          stepsToFinish: 5,
          continueMode: 'auto',
          maxAnswerLength: 40,
          safeRoundNoLifeLoss: true,
          lastChanceLivesThreshold: 1,
          resultDelayMs: 1700,
          scoreCountDurationMs: 1200
        },
        movement: {
          shapeType: 'horizontal',
          movementType: 'pingpong',
          minStopDelayMs: 800,
          defaultSpeed: 300,
          indicatorType: 'runner'
        },
        progress: {
          playerToken: '🏃',
          playerTokenImage: '',
          finishIcon: '🏁'
        },
        ui: {
          lifeDisplay: 'hearts',
          showAccuracy: true,
          showCombo: true,
          showSegmentBorders: false,
          unifiedRail: true,
          answerStyle: 'band',
          lockIndicatorOnWrong: true,
          autoNextDelayMs: 1700
        },
        scoring: {
          baseCorrect: 100,
          comboStep: 50,
          comboCap: 5,
          perfectBonus: 100,
          speedRoundMultiplier: 1.5,
          bossRoundMultiplier: 2,
          doubleStepBonus: 50
        },
        bonuses: {
          freezeDurationMs: 10000,
          energyEnabled: true,
          energyMax: 100,
          freezeCost: 100,
          fiftyCost: 60,
          energyGainCorrect: 30,
          energyGainPerfect: 20,
          energyLossWrong: 20
        },
        perfect: {
          enabled: true,
          thresholdRatio: 0.12,
          text: 'PERFECT!'
        },
        achievements: {
          enabled: true,
          list: [
            { id: 'combo3', check: 'combo3', title: 'Ачивка', text: 'Серия 3 подряд' },
            { id: 'combo5', check: 'combo5', title: 'Ачивка', text: 'Серия 5 подряд' },
            { id: 'perfect3', check: 'perfect3', title: 'Снайпер', text: '3 Perfect подряд' },
            { id: 'survivor', check: 'survivor', title: 'Спасение', text: 'Победа с 1 жизнью' },
            { id: 'cool', check: 'cool', title: 'Хладнокровие', text: 'Победа без Freeze' }
          ]
        },
        audio: {
          enabled: true,
          volume: 0.05,
          scoreTickIntervalMs: 40
        },
        messages: {
          correct: ['Верно!', 'Отлично!', 'Так держать!'],
          wrong: ['Немного не так.', 'Попробуем дальше.', 'Не сдавайся!'],
          combo: {
            2: 'Отлично! Комбо x2',
            3: 'Серия x3!',
            5: 'Мастер! Комбо x5'
          },
          perfect: ['Идеально!', 'Точное попадание!', 'Perfect!'],
          lastChance: 'Последний шанс!'
        },
        debug: false
      };

      const DEFAULT_QUESTIONS = [
        {
          id: 'question_1',
          question: 'Какое число является простым?',
          answers: ['9', '11', '15'],
          correct_index: 1,
          speed: 340,
          mode: 'normal'
        },
        {
          id: 'question_2',
          question: 'Какая планета известна как Красная планета?',
          answers: ['Венера', 'Марс', 'Сатурн'],
          correct_index: 1,
          speed: 360,
          mode: 'speed'
        },
        {
          id: 'question_3',
          question: 'Сколько будет 6 × 7?',
          answers: ['42', '36', '48'],
          correct_index: 0,
          speed: 300,
          mode: 'safe'
        },
        {
          id: 'question_4',
          question: 'Какой океан самый большой?',
          answers: ['Атлантический', 'Индийский', 'Тихий'],
          correct_index: 2,
          speed: 320,
          mode: 'double_step'
        },
        {
          id: 'question_5',
          question: 'Какой газ растения поглощают из воздуха?',
          answers: ['Кислород', 'Углекислый газ', 'Азот'],
          correct_index: 1,
          speed: 390,
          mode: 'boss'
        }
      ];

      function deepMerge(target, source) {
        const output = Array.isArray(target) ? target.slice() : { ...target };
        if (!source || typeof source !== 'object') return output;
        Object.keys(source).forEach((key) => {
          const value = source[key];
          if (Array.isArray(value)) output[key] = value.slice();
          else if (value && typeof value === 'object') {
            output[key] = deepMerge(output[key] && typeof output[key] === 'object' ? output[key] : {}, value);
          } else output[key] = value;
        });
        return output;
      }
      const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
      const percent = (value, total) => total ? Math.round((value / total) * 100) : 0;
      const randomFrom = (arr) => arr[Math.floor(Math.random() * arr.length)];
      const truncateText = (text, maxLength) => typeof text !== 'string' ? '' : (text.length > maxLength ? text.slice(0, maxLength - 1) + '…' : text);

      function validateQuestions(questions, maxAnswerLength) {
        if (!Array.isArray(questions) || !questions.length) throw new Error('Questions array is empty.');
        questions.forEach((q, index) => {
          if (!q || typeof q !== 'object') throw new Error(`Question at index ${index} is invalid.`);
          if (!Array.isArray(q.answers) || q.answers.length < 3 || q.answers.length > 5) throw new Error(`Question "${q.id || index}" must contain 3..5 answers.`);
          if (typeof q.correct_index !== 'number' || q.correct_index < 0 || q.correct_index >= q.answers.length) throw new Error(`Question "${q.id || index}" has invalid correct_index.`);
          q.answers.forEach((answer, answerIndex) => {
            if (String(answer).length > maxAnswerLength) throw new Error(`Answer ${answerIndex} in "${q.id || index}" exceeds maxAnswerLength (${maxAnswerLength}).`);
          });
        });
      }

      function createAudioManager(configRef) {
        let ctx = null;
        let freezeLoopNodes = null;
        let freezeLfoNodes = null;
        let scoreTickTimer = null;

        function ensureContext() {
          if (!configRef.audio.enabled) return null;
          if (!ctx) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            ctx = new AudioContextClass();
          }
          if (ctx.state === 'suspended') ctx.resume().catch(() => {});
          return ctx;
        }

        function beep(freq, duration, type, volumeMultiplier = 1) {
          const audioCtx = ensureContext();
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const now = audioCtx.currentTime;
          const volume = clamp(Number(configRef.audio.volume || 0.05) * volumeMultiplier, 0, 1);
          osc.type = type || 'sine';
          osc.frequency.setValueAtTime(freq, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(volume, 0.0001), now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.02);
        }

        function startFreezeLoop() {
          const audioCtx = ensureContext();
          if (!audioCtx || freezeLoopNodes) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const lfo = audioCtx.createOscillator();
          const lfoGain = audioCtx.createGain();
          const now = audioCtx.currentTime;
          const baseVolume = clamp(Number(configRef.audio.volume || 0.05) * 0.18, 0, 0.08);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(460, now);
          lfo.type = 'sine';
          lfo.frequency.setValueAtTime(3.2, now);
          lfoGain.gain.setValueAtTime(0.02, now);
          lfo.connect(lfoGain);
          lfoGain.connect(gain.gain);
          gain.gain.setValueAtTime(baseVolume, now);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          lfo.start(now);
          freezeLoopNodes = { osc, gain };
          freezeLfoNodes = { lfo, lfoGain };
        }

        function stopFreezeLoop() {
          if (!ctx || !freezeLoopNodes) return;
          const now = ctx.currentTime;
          try {
            freezeLoopNodes.gain.gain.cancelScheduledValues(now);
            freezeLoopNodes.gain.gain.setValueAtTime(freezeLoopNodes.gain.gain.value || 0.01, now);
            freezeLoopNodes.gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
            freezeLoopNodes.osc.stop(now + 0.1);
            freezeLfoNodes.lfo.stop(now + 0.1);
          } catch (e) {}
          freezeLoopNodes = null;
          freezeLfoNodes = null;
        }

        function startScoreTicks(durationMs = 1000) {
          if (scoreTickTimer) clearInterval(scoreTickTimer);
          const interval = Number(configRef.audio.scoreTickIntervalMs || 40);
          scoreTickTimer = setInterval(() => {
            beep(700 + Math.random() * 120, 0.04, 'square', 0.35);
          }, interval);
          setTimeout(() => {
            if (scoreTickTimer) clearInterval(scoreTickTimer);
            scoreTickTimer = null;
            beep(980, 0.15, 'triangle', 0.8);
          }, durationMs);
        }

        return {
          correct() { beep(720, 0.16, 'triangle', 1); setTimeout(() => beep(960, 0.18, 'triangle', 1), 70); },
          wrong() { beep(220, 0.2, 'sawtooth', 1); setTimeout(() => beep(180, 0.16, 'sawtooth', 1), 80); },
          click() { beep(520, 0.06, 'square', 0.9); },
          freezeStart() { beep(420, 0.14, 'sine', 1.1); setTimeout(() => beep(520, 0.14, 'sine', 1.1), 90); startFreezeLoop(); },
          freezeStop() { beep(680, 0.08, 'triangle', 0.9); stopFreezeLoop(); },
          fifty() { beep(600, 0.08, 'square', 1); setTimeout(() => beep(760, 0.08, 'square', 1), 60); },
          perfect() { beep(980, 0.12, 'triangle', 1.15); setTimeout(() => beep(1220, 0.12, 'triangle', 1.15), 80); },
          achievement() { beep(880, 0.1, 'triangle', 0.9); setTimeout(() => beep(1180, 0.16, 'triangle', 0.9), 90); },
          scoreCount(durationMs) { startScoreTicks(durationMs); },
          shutdown() {
            stopFreezeLoop();
            if (scoreTickTimer) clearInterval(scoreTickTimer);
            scoreTickTimer = null;
          }
        };
      }

      function createGame() {
        let rootEl = null;
        let config = deepMerge({}, DEFAULT_CONFIG);
        let questions = DEFAULT_QUESTIONS.slice();
        let rafId = 0;
        let lastTs = 0;
        let roundTimeout = null;
        let freezeInterval = null;
        let resizeObserver = null;
        let audio = createAudioManager(config);
        let scoreAnimFrame = 0;

        const state = {
          status: 'idle',
          currentQuestionIndex: 0,
          lives: 3,
          correctAnswers: 0,
          wrongAnswers: 0,
          combo: 0,
          bestCombo: 0,
          perfectAnswers: 0,
          perfectStreak: 0,
          progressStep: 0,
          stepsToFinish: 5,
          accuracy: 0,
          score: 0,
          displayedScore: 0,
          scoreAnimating: false,
          energy: 0,
          achievementsUnlocked: [],
          usedFreezeAnyTime: false,
          indicator: {
            position: 0,
            direction: 1,
            speed: 300,
            movementType: 'pingpong'
          },
          bonuses: {
            freezeActive: false,
            freezeRemainingMs: 0,
            freezeResumeStatus: null
          },
          currentRound: {
            selectedIndex: null,
            correctIndex: null,
            result: null,
            stopAvailableAt: 0,
            hiddenIndices: [],
            visibleIndices: [],
            questionId: null,
            isPerfect: false,
            awardedScore: 0,
            mode: 'normal',
            stepGain: 1,
            energyGain: 0
          }
        };

        const dom = {};
        function emit(eventName, detail) { if (rootEl) rootEl.dispatchEvent(new CustomEvent(eventName, { detail })); }

        function destroyTimers() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = 0;
          if (scoreAnimFrame) cancelAnimationFrame(scoreAnimFrame);
          scoreAnimFrame = 0;
          if (roundTimeout) clearTimeout(roundTimeout);
          roundTimeout = null;
          if (freezeInterval) clearInterval(freezeInterval);
          freezeInterval = null;
          audio.freezeStop();
          lastTs = 0;
        }

        const getCurrentQuestion = () => questions[state.currentQuestionIndex];
        const getTotalAnswered = () => state.correctAnswers + state.wrongAnswers;
        function updateAccuracy() {
          state.accuracy = getTotalAnswered() > 0 ? Math.round((state.correctAnswers / getTotalAnswered()) * 100) : 0;
        }

        function getLifeIcons() {
          const maxLives = config.gameplay.lives;
          const currentLives = state.lives;
          let out = '';
          const icon = config.ui.lifeDisplay === 'hearts' ? '♥' : '●';
          for (let i = 0; i < maxLives; i++) {
            out += i < currentLives ? icon : '♡';
            if (i < maxLives - 1) out += ' ';
          }
          return out;
        }

        function getComboMessage(combo) {
          if (config.messages.combo[combo]) return config.messages.combo[combo];
          if (combo >= 5) return config.messages.combo[5];
          if (combo >= 3) return config.messages.combo[3];
          if (combo >= 2) return config.messages.combo[2];
          return '';
        }

        function questionModeClass(mode) {
          if (mode === 'boss') return 'mot-question--boss';
          if (mode === 'speed') return 'mot-question--speed';
          if (mode === 'safe') return 'mot-question--safe';
          if (mode === 'double_step') return 'mot-question--double';
          return '';
        }

        function getBonusAvailable(type) {
          const energy = state.energy;
          if (type === 'freeze') return energy >= Number(config.bonuses.freezeCost || 100);
          if (type === 'fifty') return energy >= Number(config.bonuses.fiftyCost || 60);
          return false;
        }

        function spendEnergy(amount) {
          state.energy = clamp(state.energy - amount, 0, Number(config.bonuses.energyMax || 100));
        }

        function gainEnergy(amount) {
          state.energy = clamp(state.energy + amount, 0, Number(config.bonuses.energyMax || 100));
        }

        function animateScoreTo(target, durationMs = 800) {
          if (scoreAnimFrame) cancelAnimationFrame(scoreAnimFrame);
          const start = state.displayedScore;
          const diff = target - start;
          const startTime = performance.now();
          state.scoreAnimating = true;
          audio.scoreCount(durationMs);
          function frame(now) {
            const progress = clamp((now - startTime) / durationMs, 0, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            state.displayedScore = Math.round(start + diff * eased);
            render();
            if (progress < 1) scoreAnimFrame = requestAnimationFrame(frame);
            else {
              state.displayedScore = target;
              state.scoreAnimating = false;
              scoreAnimFrame = 0;
              render();
            }
          }
          scoreAnimFrame = requestAnimationFrame(frame);
        }

        function showToast(title, text, type = 'achievement') {
          if (!dom.toastLayer) return;
          const el = document.createElement('div');
          el.className = `mot-toast mot-toast--${type}`;
          el.innerHTML = `<div class="mot-toast__title">${title}</div><div class="mot-toast__text">${text}</div>`;
          dom.toastLayer.appendChild(el);
          setTimeout(() => el.classList.add('mot-toast--out'), 1800);
          setTimeout(() => el.remove(), 2100);
        }

        function triggerPerfectBurst() {
          dom.perfectBurst.classList.remove('mot-perfect-burst--show');
          void dom.perfectBurst.offsetWidth;
          dom.perfectBurst.textContent = config.perfect.text || 'PERFECT!';
          dom.perfectBurst.classList.add('mot-perfect-burst--show');
        }

        function triggerShake() {
          dom.mainPanel.classList.remove('mot-shake');
          void dom.mainPanel.offsetWidth;
          dom.mainPanel.classList.add('mot-shake');
        }

        function maybeUnlockAchievement(code) {
          if (!config.achievements.enabled) return;
          const found = (config.achievements.list || []).find((item) => item.check === code);
          if (!found) return;
          if (state.achievementsUnlocked.includes(found.id)) return;
          state.achievementsUnlocked.push(found.id);
          audio.achievement();
          showToast(found.title, found.text, 'achievement');
        }

        function checkAchievementsOnCorrect() {
          if (state.combo >= 3) maybeUnlockAchievement('combo3');
          if (state.combo >= 5) maybeUnlockAchievement('combo5');
          if (state.perfectStreak >= 3) maybeUnlockAchievement('perfect3');
        }

        function checkAchievementsOnWin() {
          if (state.lives <= 1) maybeUnlockAchievement('survivor');
          if (!state.usedFreezeAnyTime) maybeUnlockAchievement('cool');
        }

        function spawnConfetti(count = 80) {
          if (!dom.confettiLayer) return;
          dom.confettiLayer.innerHTML = '';
          const colors = ['#22c55e', '#38bdf8', '#f59e0b', '#ef4444', '#a78bfa', '#fde68a'];
          for (let i = 0; i < count; i++) {
            const piece = document.createElement('div');
            piece.className = 'mot-confetti';
            piece.style.left = `${Math.random() * 100}%`;
            piece.style.background = colors[i % colors.length];
            piece.style.animationDuration = `${3.2 + Math.random() * 2.2}s`;
            piece.style.animationDelay = `${Math.random() * 0.35}s`;
            piece.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
            dom.confettiLayer.appendChild(piece);
          }
        }

        function render() {
          if (!rootEl) return;
          updateAccuracy();
          const question = getCurrentQuestion();
          const answers = question ? question.answers : [];
          const segments = answers.length || 1;
          const segmentColumns = `repeat(${segments}, minmax(0, 1fr))`;

          dom.currentQuestionIndex.textContent = String(state.currentQuestionIndex + 1);
          dom.questionsTotal.textContent = String(questions.length);
          dom.combo.textContent = `x${state.combo}`;
          dom.bestCombo.textContent = `x${state.bestCombo}`;
          dom.accuracy.textContent = `${state.accuracy}%`;
          dom.lives.textContent = getLifeIcons();
          dom.score.textContent = String(state.displayedScore);
          dom.status.textContent = state.status;
          dom.goal.textContent = String(config.gameplay.stepsToFinish);
          dom.perfectCount.textContent = String(state.perfectAnswers);
          dom.questionText.textContent = question ? question.question : '—';
          dom.questionBox.className = `mot-panel mot-question ${questionModeClass(question && question.mode)}`.trim();
          dom.scoreStat.classList.toggle('mot-stat--highlight', state.combo >= 3 || state.scoreAnimating);
          dom.score.classList.toggle('mot-score-counting', state.scoreAnimating);
          dom.lifeStat.classList.toggle('mot-stat--danger', state.lives <= Number(config.gameplay.lastChanceLivesThreshold || 1));

          dom.stopButton.disabled = !(
            state.status === 'indicator_moving' && performance.now() >= state.currentRound.stopAvailableAt && !state.bonuses.freezeActive
          );
          dom.freezeButton.disabled = !(state.status === 'indicator_moving' && getBonusAvailable('freeze'));
          dom.fiftyButton.disabled = !(state.status === 'indicator_moving' && getBonusAvailable('fifty'));
          dom.freezeButton.classList.toggle('mot-btn--bonus-ready', getBonusAvailable('freeze'));
          dom.freezeButton.classList.toggle('mot-btn--freeze-active', state.bonuses.freezeActive);
          dom.fiftyButton.classList.toggle('mot-btn--bonus-ready', getBonusAvailable('fifty'));
          dom.freezeButton.textContent = state.bonuses.freezeActive ? 'Freeze активен' : `Freeze (${config.bonuses.freezeCost})`;
          dom.fiftyButton.textContent = `50/50 (${config.bonuses.fiftyCost})`;

          const timerVisible = state.bonuses.freezeActive;
          dom.timerPill.classList.toggle('mot-timer__pill--visible', timerVisible);
          dom.timerValue.textContent = timerVisible ? `${Math.ceil(state.bonuses.freezeRemainingMs / 1000)} c` : '';

          const energyMax = Number(config.bonuses.energyMax || 100);
          dom.energyValue.textContent = `${state.energy}/${energyMax}`;
          dom.energyFill.style.width = `${percent(state.energy, energyMax)}%`;

          dom.railSegments.style.gridTemplateColumns = segmentColumns;
          dom.answerBand.style.gridTemplateColumns = segmentColumns;
          dom.rail.classList.toggle('mot-rail--hide-borders', !config.ui.showSegmentBorders);
          dom.answerBand.classList.toggle('mot-answer-band--hide-borders', !config.ui.showSegmentBorders);
          dom.railSegments.innerHTML = '';
          dom.answerBand.innerHTML = '';

          answers.forEach((answer, index) => {
            const segmentEl = document.createElement('div');
            segmentEl.className = 'mot-rail__segment';
            if (state.currentRound.result === 'correct' && index === state.currentRound.correctIndex) segmentEl.classList.add('mot-rail__segment--correct');
            if (state.currentRound.result === 'wrong') {
              if (index === state.currentRound.correctIndex) segmentEl.classList.add('mot-rail__segment--correct');
              if (index === state.currentRound.selectedIndex) segmentEl.classList.add('mot-rail__segment--wrong');
            }
            dom.railSegments.appendChild(segmentEl);

            const cellEl = document.createElement('div');
            cellEl.className = 'mot-answer-band__cell';
            cellEl.textContent = truncateText(String(answer), config.gameplay.maxAnswerLength);
            if (state.currentRound.hiddenIndices.includes(index)) cellEl.classList.add('mot-answer-band__cell--hidden');
            if (state.currentRound.result === 'correct' && index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--correct');
            if (state.currentRound.result === 'wrong') {
              if (index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--correct');
              if (index === state.currentRound.selectedIndex) cellEl.classList.add('mot-answer-band__cell--wrong');
            }
            if (state.currentRound.isPerfect && index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--perfect');
            dom.answerBand.appendChild(cellEl);
          });

          renderProgressTrack();
          renderIndicator();
          renderBanner();
          renderFinalScreen();
        }

        function renderProgressTrack() {
          dom.trackFill.style.width = `${percent(state.progressStep, state.stepsToFinish)}%`;
          dom.trackTicks.innerHTML = '';
          dom.trackTicks.style.gridTemplateColumns = `repeat(${state.stepsToFinish}, minmax(0, 1fr))`;
          for (let i = 0; i < state.stepsToFinish; i++) {
            const tick = document.createElement('div');
            tick.className = 'mot-track__tick';
            dom.trackTicks.appendChild(tick);
          }
          const progressRatio = clamp(state.progressStep / state.stepsToFinish, 0, 1);
          dom.trackRunner.style.left = `${progressRatio * 100}%`;
          if (config.progress.playerTokenImage) {
            dom.trackRunner.innerHTML = `<img src="${config.progress.playerTokenImage}" alt="player token" style="width:30px;height:30px;object-fit:contain;">`;
          } else dom.trackRunner.textContent = config.progress.playerToken || '🏃';
          dom.trackFinish.textContent = config.progress.finishIcon || '🏁';
        }

        function renderIndicator() {
          const railRect = dom.rail.getBoundingClientRect();
          const width = railRect.width || dom.rail.clientWidth || 1;
          const x = clamp(state.indicator.position * width, 0, width);
          dom.indicator.style.left = `${x}px`;
          dom.indicator.classList.toggle('mot-indicator--frozen', state.bonuses.freezeActive);
        }

        function renderBanner() {
          dom.banner.className = 'mot-banner';
          if (state.status === 'question_ready' || state.status === 'indicator_moving') {
            dom.banner.classList.add('mot-banner--info');
            if (state.lives <= Number(config.gameplay.lastChanceLivesThreshold || 1)) {
              dom.banner.textContent = config.messages.lastChance || 'Последний шанс!';
              return;
            }
            if (state.bonuses.freezeActive) {
              dom.banner.textContent = 'Индикатор заморожен. Следи за таймером Freeze.';
              return;
            }
            const comboMessage = getComboMessage(state.combo);
            const energyHint = getBonusAvailable('freeze') || getBonusAvailable('fifty') ? ' Бонус заряжен.' : '';
            dom.banner.textContent = (comboMessage || 'Останови индикатор в зоне правильного ответа.') + energyHint;
            return;
          }
          if (state.currentRound.isPerfect && state.currentRound.result === 'correct') {
            dom.banner.classList.add('mot-banner--perfect');
            dom.banner.textContent = `${randomFrom(config.messages.perfect)} +${state.currentRound.awardedScore}`;
            return;
          }
          if (state.currentRound.result === 'correct') {
            dom.banner.classList.add('mot-banner--correct');
            const comboMessage = getComboMessage(state.combo);
            dom.banner.textContent = `${comboMessage || randomFrom(config.messages.correct)} +${state.currentRound.awardedScore}`;
            return;
          }
          if (state.currentRound.result === 'wrong') {
            dom.banner.classList.add('mot-banner--wrong');
            dom.banner.textContent = randomFrom(config.messages.wrong);
            return;
          }
          dom.banner.classList.add('mot-banner--info');
          dom.banner.textContent = 'Готов к следующему вопросу.';
        }

        function renderFinalScreen() {
          const visible = state.status === 'game_win' || state.status === 'game_lose';
          dom.final.classList.toggle('mot-final--visible', visible);
          if (!visible) return;
          const won = state.status === 'game_win';
          dom.finalTitle.textContent = won ? 'Победа!' : 'Игра окончена';
          dom.finalSubtitle.textContent = won ? 'Ты успешно прошел трек до финиша.' : 'Жизни закончились. Попробуй еще раз.';
          dom.finalCorrect.textContent = String(state.correctAnswers);
          dom.finalWrong.textContent = String(state.wrongAnswers);
          dom.finalProgress.textContent = `${percent(state.progressStep, state.stepsToFinish)}%`;
          dom.finalAccuracy.textContent = `${state.accuracy}%`;
          dom.finalScore.textContent = String(state.displayedScore);
        }

        function setStatus(nextStatus) { state.status = nextStatus; render(); }

        function computeSelectedSegment() {
          const question = getCurrentQuestion();
          const totalSegments = question.answers.length;
          const width = 1 / totalSegments;
          const rawIndex = Math.floor(clamp(state.indicator.position, 0, 0.999999) / width);
          return clamp(rawIndex, 0, totalSegments - 1);
        }

        function isPerfectHit(question, selectedIndex) {
          if (!config.perfect.enabled) return false;
          if (selectedIndex !== question.correct_index) return false;
          const totalSegments = question.answers.length;
          const segmentWidth = 1 / totalSegments;
          const segmentStart = selectedIndex * segmentWidth;
          const center = segmentStart + segmentWidth / 2;
          const threshold = segmentWidth * Number(config.perfect.thresholdRatio || 0.12);
          return Math.abs(state.indicator.position - center) <= threshold;
        }

        function resetRoundState() {
          state.currentRound.selectedIndex = null;
          state.currentRound.correctIndex = null;
          state.currentRound.result = null;
          state.currentRound.hiddenIndices = [];
          state.currentRound.visibleIndices = [];
          state.currentRound.questionId = null;
          state.currentRound.isPerfect = false;
          state.currentRound.awardedScore = 0;
          state.currentRound.mode = 'normal';
          state.currentRound.stepGain = 1;
          state.currentRound.energyGain = 0;
        }

        function loadQuestion(index) {
          const question = questions[index];
          if (!question) return;
          resetRoundState();
          state.currentRound.questionId = question.id;
          state.currentRound.correctIndex = question.correct_index;
          state.currentRound.visibleIndices = question.answers.map((_, i) => i);
          state.currentRound.mode = question.mode || 'normal';
          state.indicator.position = 0;
          state.indicator.direction = 1;
          state.indicator.speed = Number(question.speed || config.movement.defaultSpeed || 300);
          state.indicator.movementType = config.movement.movementType || 'pingpong';
          state.currentRound.stopAvailableAt = performance.now() + Number(config.movement.minStopDelayMs || 800);
          emit('QUESTION_LOAD', { index, question });
          setStatus('question_ready');
        }

        function tick(ts) {
          if (!lastTs) lastTs = ts;
          const delta = (ts - lastTs) / 1000;
          lastTs = ts;
          if (state.status === 'indicator_moving' && !state.bonuses.freezeActive) {
            const railRect = dom.rail.getBoundingClientRect();
            const width = Math.max(railRect.width, 1);
            const speedPxPerSec = state.indicator.speed;
            const speedNorm = speedPxPerSec / width;
            let nextPos = state.indicator.position + speedNorm * delta * state.indicator.direction;
            if (state.indicator.movementType === 'pingpong') {
              if (nextPos >= 1) { nextPos = 1 - (nextPos - 1); state.indicator.direction = -1; }
              else if (nextPos <= 0) { nextPos = Math.abs(nextPos); state.indicator.direction = 1; }
            } else {
              if (nextPos >= 1) nextPos = nextPos - 1;
              if (nextPos < 0) nextPos = 1 + nextPos;
            }
            state.indicator.position = clamp(nextPos, 0, 1);
            renderIndicator();
            if (performance.now() >= state.currentRound.stopAvailableAt) dom.stopButton.disabled = false;
          }
          rafId = requestAnimationFrame(tick);
        }

        function startIndicator() {
          if (state.status !== 'question_ready' && state.status !== 'transition_next') return;
          emit('INDICATOR_START', { questionIndex: state.currentQuestionIndex });
          setStatus('indicator_moving');
        }

        function useFreeze() {
          if (!(state.status === 'indicator_moving' && getBonusAvailable('freeze'))) return;
          spendEnergy(Number(config.bonuses.freezeCost || 100));
          state.bonuses.freezeActive = true;
          state.bonuses.freezeRemainingMs = Number(config.bonuses.freezeDurationMs || 10000);
          state.bonuses.freezeResumeStatus = 'indicator_moving';
          state.usedFreezeAnyTime = true;
          emit('BONUS_USE_FREEZE', { freezeDurationMs: state.bonuses.freezeRemainingMs });
          audio.freezeStart();
          render();
          const startedAt = Date.now();
          freezeInterval = setInterval(() => {
            const elapsed = Date.now() - startedAt;
            state.bonuses.freezeRemainingMs = Math.max(0, Number(config.bonuses.freezeDurationMs || 10000) - elapsed);
            render();
            if (state.bonuses.freezeRemainingMs <= 0) {
              clearInterval(freezeInterval);
              freezeInterval = null;
              state.bonuses.freezeActive = false;
              state.bonuses.freezeRemainingMs = 0;
              audio.freezeStop();
              render();
            }
          }, 100);
        }

        function useFifty() {
          if (!(state.status === 'indicator_moving' && getBonusAvailable('fifty'))) return;
          const question = getCurrentQuestion();
          const wrongIndices = question.answers.map((_, i) => i).filter((i) => i !== question.correct_index);
          if (wrongIndices.length <= 1) return;
          const keptWrongIndex = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
          const hide = wrongIndices.filter((i) => i !== keptWrongIndex).slice(0, 2);
          spendEnergy(Number(config.bonuses.fiftyCost || 60));
          state.currentRound.hiddenIndices = hide;
          emit('BONUS_USE_FIFTY', { hiddenIndices: hide, keptWrongIndex });
          audio.fifty();
          render();
        }

        function calculateRoundRewards(question, isCorrect, isPerfect) {
          let awardedScore = 0;
          let stepGain = 0;
          let energyGain = 0;
          if (!isCorrect) return { awardedScore, stepGain, energyGain };
          const comboMultiplier = Math.min(state.combo, Number(config.scoring.comboCap || 5)) * Number(config.scoring.comboStep || 50);
          awardedScore += Number(config.scoring.baseCorrect || 100) + comboMultiplier;
          energyGain += Number(config.bonuses.energyGainCorrect || 30);
          stepGain = 1;
          if (question.mode === 'speed') awardedScore = Math.round(awardedScore * Number(config.scoring.speedRoundMultiplier || 1.5));
          if (question.mode === 'boss') awardedScore = Math.round(awardedScore * Number(config.scoring.bossRoundMultiplier || 2));
          if (question.mode === 'double_step') {
            stepGain = 2;
            awardedScore += Number(config.scoring.doubleStepBonus || 50);
          }
          if (isPerfect) {
            awardedScore += Number(config.scoring.perfectBonus || 100);
            energyGain += Number(config.bonuses.energyGainPerfect || 20);
          }
          return { awardedScore, stepGain, energyGain };
        }

        function checkAnswer() {
          if (state.status !== 'indicator_stopped') return;
          const question = getCurrentQuestion();
          const isCorrect = state.currentRound.selectedIndex === question.correct_index;
          const perfectHit = isPerfectHit(question, state.currentRound.selectedIndex);
          state.currentRound.correctIndex = question.correct_index;
          state.currentRound.result = isCorrect ? 'correct' : 'wrong';
          state.currentRound.isPerfect = perfectHit;
          emit('ANSWER_CHECK', { selectedIndex: state.currentRound.selectedIndex, correctIndex: question.correct_index, isCorrect, perfectHit });

          if (isCorrect) {
            state.combo += 1;
            state.bestCombo = Math.max(state.bestCombo, state.combo);
            state.correctAnswers += 1;
            state.perfectStreak = perfectHit ? state.perfectStreak + 1 : 0;
            if (perfectHit) state.perfectAnswers += 1;
            const rewards = calculateRoundRewards(question, true, perfectHit);
            state.currentRound.awardedScore = rewards.awardedScore;
            state.currentRound.stepGain = rewards.stepGain;
            state.currentRound.energyGain = rewards.energyGain;
            state.progressStep += rewards.stepGain;
            state.score += rewards.awardedScore;
            gainEnergy(rewards.energyGain);
            animateScoreTo(state.score, Number(config.gameplay.scoreCountDurationMs || 1200));
            if (perfectHit) {
              audio.perfect();
              triggerPerfectBurst();
              showToast('Perfect', `+${rewards.awardedScore} очков`, 'perfect');
            } else {
              audio.correct();
            }
            checkAchievementsOnCorrect();
            emit('ANSWER_CORRECT', { progressStep: state.progressStep, combo: state.combo, awardedScore: rewards.awardedScore });
          } else {
            const safeRound = question.mode === 'safe' && config.gameplay.safeRoundNoLifeLoss;
            if (!safeRound) state.lives -= 1;
            state.wrongAnswers += 1;
            state.combo = 0;
            state.perfectStreak = 0;
            state.currentRound.awardedScore = 0;
            state.currentRound.stepGain = 0;
            state.currentRound.energyGain = -Number(config.bonuses.energyLossWrong || 20);
            gainEnergy(-Number(config.bonuses.energyLossWrong || 20));
            audio.wrong();
            triggerShake();
            emit('ANSWER_WRONG', { lives: state.lives, safeRound });
          }

          updateAccuracy();
          setStatus('showing_result');

          if (state.progressStep >= state.stepsToFinish) {
            roundTimeout = setTimeout(() => {
              checkAchievementsOnWin();
              emit('GAME_WIN', { state: getPublicState() });
              setStatus('game_win');
              spawnConfetti(100);
            }, 1100);
            return;
          }
          if (state.lives <= 0) {
            roundTimeout = setTimeout(() => {
              emit('GAME_LOSE', { state: getPublicState() });
              setStatus('game_lose');
            }, 1100);
            return;
          }
          roundTimeout = setTimeout(() => nextQuestion(), Number(config.ui.autoNextDelayMs || 1700));
        }

        function stopIndicator() {
          if (state.status !== 'indicator_moving') return;
          if (performance.now() < state.currentRound.stopAvailableAt) return;
          if (state.bonuses.freezeActive) return;
          state.currentRound.selectedIndex = computeSelectedSegment();
          emit('INDICATOR_STOP', { indicatorPosition: state.indicator.position, selectedIndex: state.currentRound.selectedIndex });
          setStatus('indicator_stopped');
          checkAnswer();
        }

        function nextQuestion() {
          if (state.status === 'game_win' || state.status === 'game_lose') return;
          state.currentQuestionIndex = (state.currentQuestionIndex + 1) % questions.length;
          emit('NEXT_QUESTION', { currentQuestionIndex: state.currentQuestionIndex });
          loadQuestion(state.currentQuestionIndex);
          roundTimeout = setTimeout(() => startIndicator(), 260);
        }

        function getPublicState() {
          return JSON.parse(JSON.stringify({
            status: state.status,
            currentQuestionIndex: state.currentQuestionIndex,
            lives: state.lives,
            correctAnswers: state.correctAnswers,
            wrongAnswers: state.wrongAnswers,
            combo: state.combo,
            bestCombo: state.bestCombo,
            perfectAnswers: state.perfectAnswers,
            progressStep: state.progressStep,
            stepsToFinish: state.stepsToFinish,
            accuracy: state.accuracy,
            score: state.score,
            displayedScore: state.displayedScore,
            energy: state.energy,
            achievementsUnlocked: state.achievementsUnlocked,
            indicator: state.indicator,
            bonuses: state.bonuses,
            currentRound: state.currentRound
          }));
        }

        function attachEvents() {
          dom.stopButton.addEventListener('click', () => { audio.click(); stopIndicator(); });
          dom.freezeButton.addEventListener('click', () => { audio.click(); useFreeze(); });
          dom.fiftyButton.addEventListener('click', () => { audio.click(); useFifty(); });
          dom.restartButton.addEventListener('click', () => { audio.click(); api.restart(); });
          dom.exitButton.addEventListener('click', () => { audio.click(); dom.final.classList.remove('mot-final--visible'); });
        }

          mountEl.innerHTML = '';
          const wrapper = document.createElement('div');
          wrapper.className = 'mot-root';
          wrapper.innerHTML = `

                    </div>
                    <button class="mot-btn mot-btn--bonus" type="button" data-mot="fiftyButton">50/50</button>

                  </div>

                </div>

                  <div class="mot-timer">
                    <div class="mot-timer__pill" data-mot="timerPill"><span>❄</span><span>Freeze:</span><span data-mot="timerValue"></span></div>

              </section>
            </div>

            <div class="mot-perfect-burst" data-mot="perfectBurst">PERFECT!</div>

            <div class="mot-final" data-mot="finalScreen" aria-live="polite">
              <div class="mot-final__card">
                <div class="mot-confetti-layer" data-mot="confettiLayer"></div>

                <div class="mot-final__subtitle" data-mot="finalSubtitle">Результат игры</div>
                <div class="mot-final__stats">
                  <div class="mot-final__stat"><div class="mot-final__stat-value" data-mot="finalCorrect">0</div><div class="mot-final__stat-label">Верных</div></div>

          `;
          mountEl.appendChild(wrapper);
          rootEl = wrapper;
          dom.currentQuestionIndex = rootEl.querySelector('[data-mot="currentQuestionIndex"]');
          dom.questionsTotal = rootEl.querySelector('[data-mot="questionsTotal"]');
          dom.combo = rootEl.querySelector('[data-mot="combo"]');
          dom.bestCombo = rootEl.querySelector('[data-mot="bestCombo"]');
          dom.accuracy = rootEl.querySelector('[data-mot="accuracy"]');
          dom.lives = rootEl.querySelector('[data-mot="lives"]');
          dom.score = rootEl.querySelector('[data-mot="score"]');
          dom.status = { textContent: '' };
          dom.goal = rootEl.querySelector('[data-mot="goal"]');
          dom.track = rootEl.querySelector('[data-mot="track"]');
          dom.trackFill = rootEl.querySelector('[data-mot="trackFill"]');
          dom.trackTicks = rootEl.querySelector('[data-mot="trackTicks"]');
          dom.trackRunner = rootEl.querySelector('[data-mot="trackRunner"]');
          dom.trackFinish = rootEl.querySelector('[data-mot="trackFinish"]');
          dom.questionText = rootEl.querySelector('[data-mot="questionText"]');
          dom.questionBox = rootEl.querySelector('[data-mot="questionBox"]');
          dom.rail = rootEl.querySelector('[data-mot="rail"]');
          dom.railSegments = rootEl.querySelector('[data-mot="railSegments"]');
          dom.indicator = rootEl.querySelector('[data-mot="indicator"]');
          dom.answerBand = rootEl.querySelector('[data-mot="answerBand"]');
          dom.freezeButton = rootEl.querySelector('[data-mot="freezeButton"]');
          dom.fiftyButton = rootEl.querySelector('[data-mot="fiftyButton"]');
          dom.stopButton = rootEl.querySelector('[data-mot="stopButton"]');
          dom.banner = rootEl.querySelector('[data-mot="banner"]');
          dom.timerPill = rootEl.querySelector('[data-mot="timerPill"]');
          dom.timerValue = rootEl.querySelector('[data-mot="timerValue"]');
          dom.final = rootEl.querySelector('[data-mot="finalScreen"]');
          dom.finalTitle = rootEl.querySelector('[data-mot="finalTitle"]');
          dom.finalSubtitle = rootEl.querySelector('[data-mot="finalSubtitle"]');
          dom.finalCorrect = rootEl.querySelector('[data-mot="finalCorrect"]');
          dom.finalWrong = rootEl.querySelector('[data-mot="finalWrong"]');
          dom.finalProgress = rootEl.querySelector('[data-mot="finalProgress"]');
          dom.finalAccuracy = rootEl.querySelector('[data-mot="finalAccuracy"]');
          dom.finalScore = rootEl.querySelector('[data-mot="finalScore"]');
          dom.restartButton = rootEl.querySelector('[data-mot="restartButton"]');
          dom.exitButton = rootEl.querySelector('[data-mot="exitButton"]');
          dom.energyValue = rootEl.querySelector('[data-mot="energyValue"]');
          dom.energyFill = rootEl.querySelector('[data-mot="energyFill"]');
          dom.toastLayer = rootEl.querySelector('[data-mot="toastLayer"]');
          dom.perfectBurst = rootEl.querySelector('[data-mot="perfectBurst"]');
          dom.mainPanel = rootEl.querySelector('[data-mot="mainPanel"]');
          dom.lifeStat = rootEl.querySelector('[data-mot="lifeStat"]');
          dom.scoreStat = rootEl.querySelector('[data-mot="scoreStat"]');
          dom.perfectCount = rootEl.querySelector('[data-mot="perfectCount"]');
          dom.confettiLayer = rootEl.querySelector('[data-mot="confettiLayer"]');
          dom.goal.textContent = String(config.gameplay.stepsToFinish);
          attachEvents();
          if (typeof ResizeObserver !== 'undefined') {
            resizeObserver = new ResizeObserver(() => renderIndicator());
            resizeObserver.observe(rootEl);
            resizeObserver.observe(dom.rail);
          } else {
            window.addEventListener('resize', renderIndicator);
          }
        }

        function resetState() {
          state.status = 'idle';
          state.currentQuestionIndex = 0;
          state.lives = Number(config.gameplay.lives || 3);
          state.correctAnswers = 0;
          state.wrongAnswers = 0;
          state.combo = 0;
          state.bestCombo = 0;
          state.perfectAnswers = 0;
          state.perfectStreak = 0;
          state.progressStep = 0;
          state.stepsToFinish = Number(config.gameplay.stepsToFinish || 5);
          state.accuracy = 0;
          state.score = 0;
          state.displayedScore = 0;
          state.scoreAnimating = false;
          state.energy = 0;
          state.achievementsUnlocked = [];
          state.usedFreezeAnyTime = false;
          state.indicator.position = 0;
          state.indicator.direction = 1;
          state.indicator.speed = Number(config.movement.defaultSpeed || 300);
          state.indicator.movementType = config.movement.movementType || 'pingpong';
          state.bonuses.freezeActive = false;
          state.bonuses.freezeRemainingMs = 0;
          state.bonuses.freezeResumeStatus = null;
          resetRoundState();
        }

        const api = {
          init(userConfig = {}, userQuestions = null, mountTarget = '#moment-of-truth-root') {
            destroyTimers();
            config = deepMerge(DEFAULT_CONFIG, userConfig || {});
            audio = createAudioManager(config);
            const nextQuestions = Array.isArray(userQuestions) ? userQuestions : questions;
            validateQuestions(nextQuestions, config.gameplay.maxAnswerLength);
            questions = nextQuestions.map((q) => ({ ...q, answers: q.answers.slice() }));
            const mountEl = typeof mountTarget === 'string' ? document.querySelector(mountTarget) : mountTarget;
            if (!mountEl) throw new Error('Mount element not found.');
            buildDOM(mountEl);
            resetState();
            emit('GAME_INIT', { config, questions });
            loadQuestion(0);
            render();
            return this;
          },
          start() {
            if (!rootEl) throw new Error('Call MomentOfTruth.init(config) before start().');
            if (state.status === 'idle' || state.status === 'question_ready' || state.status === 'transition_next') {
              emit('GAME_START', { state: getPublicState() });
              startIndicator();
              if (!rafId) rafId = requestAnimationFrame(tick);
            }
            return this;
          },
          restart() {
            destroyTimers();
            resetState();
            emit('GAME_RESTART', { state: getPublicState() });
            loadQuestion(0);
            render();
            this.start();
            return this;
          },
          destroy() {
            destroyTimers();
            audio.shutdown();
            if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
            else window.removeEventListener('resize', renderIndicator);
            if (rootEl && rootEl.parentNode) rootEl.parentNode.removeChild(rootEl);
            rootEl = null;
          },
          getState() { return getPublicState(); },
          setConfig(nextConfig = {}) {
            config = deepMerge(config, nextConfig);
            audio = createAudioManager(config);
            state.stepsToFinish = Number(config.gameplay.stepsToFinish || state.stepsToFinish);
            render();
            return this;
          },
          loadQuestions(nextQuestions = []) {
            validateQuestions(nextQuestions, config.gameplay.maxAnswerLength);
            questions = nextQuestions.map((q) => ({ ...q, answers: q.answers.slice() }));
            resetState();
            loadQuestion(0);
            render();
            return this;
          }
        };

        return api;
      }

      window.MomentOfTruth = createGame();

      const demoConfig = {
        gameplay: {
          lives: 3,
          stepsToFinish: 6,
          maxAnswerLength: 40,
          scoreCountDurationMs: 1100
        },
        movement: {
          movementType: 'pingpong',
          minStopDelayMs: 800,
          defaultSpeed: 320,
          indicatorType: 'runner'
        },
        bonuses: {
          freezeDurationMs: 10000,
          energyEnabled: true,
          energyMax: 100,
          freezeCost: 100,
          fiftyCost: 60,
          energyGainCorrect: 30,
          energyGainPerfect: 20,
          energyLossWrong: 20
        },
        perfect: {
          enabled: true,
          thresholdRatio: 0.12,
          text: 'PERFECT!'
        },
        audio: { enabled: true, volume: 0.05 }
      };

      const demoQuestions = DEFAULT_QUESTIONS;

      document.addEventListener('DOMContentLoaded', function () {
        window.MomentOfTruth.init(demoConfig, demoQuestions, '#moment-of-truth-root').start();
      });
    })();
  </script>
</body>
</html>
