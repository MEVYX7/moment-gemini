<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moment of Truth - Genially Extension</title>
    <style>
        :root {
            --primary-color: #6a11cb;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-viewport {
            width: 800px;
            height: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        /* Верхняя панель: Жизни и Прогресс */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #track {
            flex-grow: 1;
            height: 10px;
            background: #eee;
            margin: 0 20px;
            border-radius: 5px;
            position: relative;
        }

        #player-token {
            position: absolute;
            top: -15px;
            left: 0%;
            font-size: 24px;
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #lives-display { font-size: 20px; }

        /* Зона вопроса */
        #question-area {
            text-align: center;
            margin-bottom: 30px;
            min-height: 60px;
        }

        #question-text { font-size: 22px; font-weight: bold; color: #333; }

        /* Игровая шкала */
        #game-scale {
            width: 90%;
            height: 80px;
            background: #f0f0f0;
            border-radius: 10px;
            position: relative;
            display: flex;
            overflow: hidden;
            border: 4px solid #333;
        }

        .segment {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            border-right: 1px solid rgba(0,0,0,0.1);
            transition: background 0.3s;
            padding: 5px;
            text-align: center;
        }

        /* Индикатор */
        #indicator {
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #ff0000;
            box-shadow: 0 0 10px rgba(255,0,0,0.8);
            z-index: 10;
        }

        /* Кнопка */
        #stop-btn {
            margin-top: 40px;
            padding: 15px 60px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
        }

        #stop-btn:active { transform: translateY(2px); }
        #stop-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Анимации попадания */
        .correct-hit { background-color: var(--success-color) !important; color: white; }
        .wrong-hit { background-color: var(--error-color) !important; color: white; }

        #combo-badge {
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <div class="header">
        <div id="lives-display">❤️ ❤️ ❤️</div>
        <div id="track">
            <div id="player-token">🏃</div>
        </div>
    </div>

    <div id="question-area">
        <div id="question-text">Приготовьтесь...</div>
    </div>

    <div id="game-scale">
        <div id="indicator"></div>
        </div>

    <button id="stop-btn">СТОП</button>
    <div id="combo-badge"></div>
</div>

<script>
/**
 * НАСТРОЙКИ (будут приходить из редактора)
 */
const gameSettings = {
    lives: 3,
    stepsToFinish: 5,
    indicatorSpeed: 2, // 1-5
    movementType: 'ping-pong', // 'loop' или 'ping-pong'
    questions: [
        { q: "Какой газ преобладает в атмосфере Земли?", a: ["Кислород", "Азот", "Углекислый газ", "Аргон"], correct: 1 },
        { q: "2 + 2 * 2 = ?", a: ["8", "6", "4", "10"], correct: 1 },
        { q: "Сколько планет в Солнечной системе?", a: ["7", "9", "8", "6"], correct: 2 },
        { q: "Самый большой океан?", a: ["Атлантический", "Индийский", "Тихий"], correct: 2 }
    ],
    design: {
        tokenEmoji: "🏃",
        lifeEmoji: "❤️",
        colors: ["#FFD166", "#06D6A0", "#118AB2", "#EF476F", "#8338EC"]
    }
};

/**
 * СОСТОЯНИЕ ИГРЫ
 */
let state = {
    currentQuestionIdx: 0,
    currentStep: 0,
    lives: gameSettings.lives,
    combo: 0,
    pos: 0,
    direction: 1,
    isMoving: false,
    canStop: false
};

const elements = {
    indicator: document.getElementById('indicator'),
    scale: document.getElementById('game-scale'),
    qText: document.getElementById('question-text'),
    stopBtn: document.getElementById('stop-btn'),
    livesDisp: document.getElementById('lives-display'),
    token: document.getElementById('player-token'),
    comboDisp: document.getElementById('combo-badge')
};

/**
 * ЛОГИКА
 */
function initQuestion() {
    const q = gameSettings.questions[state.currentQuestionIdx];
    elements.qText.innerText = q.q;
    
    // Чистим старые сегменты
    const oldSegments = document.querySelectorAll('.segment');
    oldSegments.forEach(s => s.remove());

    // Создаем новые
    q.a.forEach((text, i) => {
        const seg = document.createElement('div');
        seg.className = 'segment';
        seg.innerText = text;
        seg.style.backgroundColor = gameSettings.design.colors[i % gameSettings.design.colors.length] + "44"; // полупрозрачный
        elements.scale.appendChild(seg);
    });

    resetIndicator();
    setTimeout(() => {
        state.isMoving = true;
        state.canStop = true;
        animate();
    }, 800);
}

function resetIndicator() {
    state.pos = 0;
    state.direction = 1;
    state.isMoving = false;
    state.canStop = false;
    elements.indicator.style.left = '0%';
    elements.stopBtn.disabled = false;
}

function animate() {
    if (!state.isMoving) return;

    const speed = gameSettings.indicatorSpeed * 0.4;
    state.pos += speed * state.direction;

    if (gameSettings.movementType === 'ping-pong') {
        if (state.pos >= 100 || state.pos <= 0) state.direction *= -1;
    } else {
        if (state.pos >= 100) state.pos = 0;
    }

    elements.indicator.style.left = state.pos + '%';
    requestAnimationFrame(animate);
}

function handleStop() {
    if (!state.canStop) return;
    state.isMoving = false;
    state.canStop = false;
    elements.stopBtn.disabled = true;

    const q = gameSettings.questions[state.currentQuestionIdx];
    const segmentWidth = 100 / q.a.length;
    const hitIndex = Math.floor(state.pos / segmentWidth);
    
    const segments = document.querySelectorAll('.segment');
    
    if (hitIndex === q.correct) {
        // Успех
        segments[hitIndex].classList.add('correct-hit');
        state.currentStep++;
        state.combo++;
        updateProgress();
    } else {
        // Провал
        segments[hitIndex].classList.add('wrong-hit');
        segments[q.correct].classList.add('correct-hit');
        state.lives--;
        state.combo = 0;
        updateLives();
    }

    setTimeout(() => {
        if (state.lives <= 0) {
            alert("Игра окончена! Вы проиграли.");
            location.reload();
        } else if (state.currentStep >= gameSettings.stepsToFinish) {
            alert("ПОБЕДА! Вы дошли до финиша.");
            location.reload();
        } else {
            state.currentQuestionIdx = (state.currentQuestionIdx + 1) % gameSettings.questions.length;
            initQuestion();
        }
    }, 1500);
}

function updateLives() {
    elements.livesDisp.innerText = gameSettings.design.lifeEmoji.repeat(state.lives);
}

function updateProgress() {
    const percent = (state.currentStep / gameSettings.stepsToFinish) * 100;
    elements.token.style.left = `calc(${percent}% - 20px)`;
    elements.comboDisp.innerText = state.combo > 1 ? `КОМБО: x${state.combo}` : '';
}

// Слушатели
elements.stopBtn.addEventListener('click', handleStop);

// Старт
updateLives();
initQuestion();

</script>
</body>
</html>
