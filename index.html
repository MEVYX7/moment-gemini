<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moment Of Truth — Improved</title>
  <style>
:root {
  --bg: #070b17;
  --panel: rgba(10, 16, 30, 0.82);
  --panel-2: rgba(11, 18, 34, 0.96);
  --text: #eef6ff;
  --muted: #9fb0c9;

  --accent: #00eaff;
  --accent-2: #8a5cff;
  --danger: #ff4d6d;
  --warning: #ffb703;
  --correct: #2aff8c;
  --wrong: #ff4d6d;

  --track: #334155;
  --track-fill: linear-gradient(90deg, #00eaff 0%, #8a5cff 58%, #2aff8c 100%);
  --segment-border: rgba(255,255,255,.14);

  --shadow: 0 18px 44px rgba(2, 8, 23, 0.52);
  --shadow-soft: 0 0 24px rgba(0, 234, 255, 0.10);

  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --button-text: #08111f;
  --font: Inter, Arial, Helvetica, sans-serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background:
    radial-gradient(circle at 12% 10%, rgba(0, 234, 255, 0.16), transparent 24%),
    radial-gradient(circle at 88% 12%, rgba(138, 92, 255, 0.18), transparent 22%),
    radial-gradient(circle at 50% 85%, rgba(42, 255, 140, 0.07), transparent 26%),
    linear-gradient(180deg, #050814 0%, #0a1020 42%, #0b1224 100%);
  color: var(--text);
  font-family: var(--font);
  min-height: 100%;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 22px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(circle at center, black 38%, transparent 100%);
  opacity: .18;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(0, 234, 255, 0.05), transparent 38%),
    radial-gradient(circle at center, rgba(138, 92, 255, 0.05), transparent 52%);
  filter: blur(30px);
  opacity: .8;
}

.game-shell {
  width: min(1120px, 100%);
  display: grid;
  gap: 20px;
  position: relative;
  z-index: 1;
}

.topbar {
  display: grid;
  grid-template-columns: 1.25fr .95fr .8fr;
  gap: 16px;
  align-items: stretch;
}

.card {
  position: relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)),
    var(--panel);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow), var(--shadow-soft);
  backdrop-filter: blur(14px);
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background:
    linear-gradient(135deg, rgba(255,255,255,.10), transparent 28%, transparent 72%, rgba(0,234,255,.06));
  opacity: .9;
}

.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 0 0 1px rgba(0,234,255,.04);
}

.question-card {
  padding: 20px 22px;
}

.question-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: .02em;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  background: linear-gradient(135deg, rgba(0,234,255,.12), rgba(138,92,255,.14));
  border: 1px solid rgba(255,255,255,.10);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 0 18px rgba(0,234,255,.08);
}

.question-text {
  font-size: clamp(22px, 2.8vw, 34px);
  line-height: 1.16;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin: 0;
  text-wrap: balance;
}

.status-card,
.bonus-card {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 12px;
}

.section-title {
  font-size: 14px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
}

.lives {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.life {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
  border: 1px solid rgba(255,255,255,.10);
  font-size: 22px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 0 14px rgba(0,234,255,.05);
  transition: transform .18s ease, opacity .18s ease, filter .18s ease;
}

.life.off {
  opacity: .28;
  transform: scale(.88);
  filter: grayscale(1);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.stat-box {
  padding: 12px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px;
  text-align: center;
  box-shadow: inset 0 0 18px rgba(0,234,255,.03);
}

.stat-box strong {
  display: block;
  font-size: 22px;
  margin-bottom: 4px;
  color: #ffffff;
}

.bonus-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  border: none;
  cursor: pointer;
  font: inherit;
}

.bonus-btn,
.ghost-btn,
.primary-btn,
.stop-btn {
  border-radius: 16px;
  font-weight: 800;
  transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease, background .15s ease, filter .15s ease;
}

.bonus-btn:hover,
.ghost-btn:hover,
.primary-btn:hover,
.stop-btn:hover {
  transform: translateY(-1px);
}

.bonus-btn:disabled,
.ghost-btn:disabled,
.primary-btn:disabled,
.stop-btn:disabled {
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}

.bonus-btn {
  padding: 12px 10px;
  color: var(--text);
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.07);
}

.bonus-btn.enabled {
  background: linear-gradient(135deg, rgba(0,234,255,.20), rgba(138,92,255,.18));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    0 0 18px rgba(0,234,255,.08);
}

.board {
  position: relative;
  padding: 20px;
  display: grid;
  gap: 18px;
  background:
    linear-gradient(180deg, rgba(12, 18, 34, 0.92), rgba(8, 13, 25, 0.96));
  border: 1px solid rgba(255,255,255,.08);
  box-shadow:
    0 24px 60px rgba(0,0,0,.45),
    0 0 0 1px rgba(0,234,255,.04),
    0 0 32px rgba(0,234,255,.08);
}

.board::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background:
    radial-gradient(circle at 18% 0%, rgba(0,234,255,.08), transparent 26%),
    radial-gradient(circle at 82% 0%, rgba(138,92,255,.10), transparent 22%);
}

.board::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -20px 40px rgba(0,0,0,.18);
}

.track-wrap {
  position: relative;
  padding: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.07);
  box-shadow: inset 0 0 24px rgba(0,234,255,.04);
}

.track-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.track {
  position: relative;
  padding: 26px 14px 10px;
}

.track-line {
  position: absolute;
  inset: 34px 12px auto 12px;
  height: 8px;
  border-radius: 999px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.12)),
    var(--track-fill);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 0 18px rgba(0,234,255,.06);
}

.track-steps {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.track-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 22px;
  flex: 1;
}

.track-step .dot {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: #182234;
  border: 2px solid rgba(255,255,255,.18);
  position: relative;
  z-index: 1;
  box-shadow: inset 0 0 8px rgba(255,255,255,.04);
  transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
}

.track-step.done .dot {
  background: var(--accent);
  box-shadow:
    0 0 0 6px rgba(0,234,255,.10),
    0 0 18px rgba(0,234,255,.18);
}

.track-step .step-label {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}

.player-token {
  position: absolute;
  top: 0;
  left: 12px;
  transform: translateX(-50%);
  width: 44px;
  height: 44px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 24px;
  background:
    radial-gradient(circle at 30% 30%, #ffffff 0%, #dff9ff 22%, #00eaff 60%, #007cf0 100%);
  color: #082032;
  box-shadow:
    0 8px 18px rgba(0,234,255,.35),
    0 0 20px rgba(138,92,255,.14);
  transition: left .35s cubic-bezier(.22,.61,.36,1);
  z-index: 2;
  overflow: hidden;
  background-size: cover;
  background-position: center;
}

.arena-wrap {
  display: grid;
  gap: 16px;
}

.arena {
  position: relative;
  background:
    radial-gradient(circle at 50% 50%, rgba(0, 234, 255, 0.08), transparent 60%),
    linear-gradient(180deg, rgba(9, 14, 26, 0.96), rgba(8, 12, 24, 0.98));
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,.08);
  padding: 22px 20px 24px;
  min-height: 320px;
  overflow: hidden;
  isolation: isolate;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.03),
    inset 0 0 40px rgba(0,234,255,.05),
    0 0 0 1px rgba(0,234,255,.05),
    0 0 28px rgba(0,234,255,.12),
    0 0 44px rgba(138,92,255,.10);
}

.arena::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: .22;
  mask-image: radial-gradient(circle at center, black 48%, transparent 100%);
}

.arena::after {
  content: "";
  position: absolute;
  inset: -20%;
  pointer-events: none;
  background:
    radial-gradient(circle, rgba(0,234,255,.09), transparent 34%),
    radial-gradient(circle, rgba(138,92,255,.08), transparent 42%);
  filter: blur(36px);
  opacity: .7;
  z-index: -1;
}

.arena.glow-correct {
  box-shadow:
    inset 0 0 0 2px rgba(42,255,140,.46),
    0 0 0 8px rgba(42,255,140,.08),
    0 0 30px rgba(42,255,140,.18);
}

.arena.glow-wrong {
  box-shadow:
    inset 0 0 0 2px rgba(255,77,109,.46),
    0 0 0 8px rgba(255,77,109,.08),
    0 0 30px rgba(255,77,109,.18);
}

.horizontal-zone,
.vertical-zone {
  position: relative;
  width: 100%;
  display: flex;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border: 1px solid rgba(255,255,255,.10);
  box-shadow:
    inset 0 0 18px rgba(0,234,255,.04),
    0 0 0 1px rgba(255,255,255,.02);
  overflow: hidden;
}

.horizontal-zone {
  height: 120px;
  border-radius: 28px;
  margin-top: 52px;
  flex-direction: row;
}

.vertical-zone {
  width: min(320px, 100%);
  height: 250px;
  margin: 14px auto 0;
  border-radius: 28px;
  flex-direction: column;
}

.segment {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 12px;
  font-weight: 700;
  line-height: 1.2;
  border-right: 1px solid var(--segment-border);
  border-bottom: 1px solid transparent;
  transition: background .2s ease, transform .2s ease, box-shadow .2s ease, opacity .2s ease;
  user-select: none;
  overflow-wrap: anywhere;
  font-size: clamp(14px, 1.6vw, 18px);
  background:
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
}

.segment::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,.08), transparent 45%);
  opacity: .45;
}

.vertical-zone .segment {
  border-right: none;
  border-bottom: 1px solid var(--segment-border);
  min-height: 0;
  flex: 1;
}

.segment:last-child { border-right: none; }
.vertical-zone .segment:last-child { border-bottom: none; }

.segment.hidden-by-5050 {
  opacity: .16;
  filter: grayscale(1);
}

.segment.selected {
  background:
    linear-gradient(180deg, rgba(0,234,255,.20), rgba(0,234,255,.10));
  box-shadow: inset 0 0 18px rgba(0,234,255,.10);
}

.segment.correct {
  background:
    linear-gradient(180deg, rgba(42,255,140,.28), rgba(42,255,140,.16));
  box-shadow: inset 0 0 20px rgba(42,255,140,.10);
}

.segment.wrong {
  background:
    linear-gradient(180deg, rgba(255,77,109,.26), rgba(255,77,109,.14));
  box-shadow: inset 0 0 20px rgba(255,77,109,.10);
}

.indicator-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.indicator {
  position: absolute;
  transition: transform .06s linear, left .06s linear, top .06s linear;
  will-change: left, top, transform;
  z-index: 3;
  display: grid;
  place-items: center;
  filter: drop-shadow(0 0 14px rgba(0,234,255,.22));
}

.indicator.arrow::before {
  content: "▼";
  font-size: 40px;
  line-height: 1;
  text-shadow:
    0 6px 10px rgba(0,0,0,.35),
    0 0 12px rgba(0,234,255,.18);
  color: #f8fafc;
}

.indicator.line {
  width: 6px;
  border-radius: 999px;
  background: linear-gradient(180deg, #ffffff, #00eaff);
  box-shadow:
    0 0 12px rgba(0,234,255,.55),
    0 0 22px rgba(138,92,255,.14);
}

.indicator.ball {
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: radial-gradient(circle at 30% 30%, #fff, #dff9ff 26%, #00eaff 72%, #007cf0 100%);
  box-shadow:
    0 8px 18px rgba(0,234,255,.42),
    0 0 22px rgba(138,92,255,.16);
}

.indicator.custom {
  width: 42px;
  height: 42px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

.arc-zone-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 340px;
  margin-top: 8px;
}

svg.arc-svg {
  width: min(760px, 100%);
  height: auto;
  overflow: visible;
}

.arc-segment-path {
  fill: rgba(255,255,255,.07);
  stroke: rgba(255,255,255,.14);
  stroke-width: 2;
  filter: drop-shadow(0 0 10px rgba(0,234,255,.04));
  transition: fill .2s ease, opacity .2s ease, filter .2s ease;
}

.arc-segment-path.correct {
  fill: rgba(42,255,140,.30);
  filter: drop-shadow(0 0 12px rgba(42,255,140,.16));
}

.arc-segment-path.wrong {
  fill: rgba(255,77,109,.28);
  filter: drop-shadow(0 0 12px rgba(255,77,109,.16));
}

.arc-segment-path.selected {
  fill: rgba(0,234,255,.20);
  filter: drop-shadow(0 0 12px rgba(0,234,255,.16));
}

.arc-segment-path.hidden-by-5050 {
  opacity: .18;
}

.arc-label {
  font-size: 15px;
  font-weight: 700;
  fill: #e5eefc;
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
}

.controls {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
}

.message-box {
  min-height: 64px;
  padding: 14px 16px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: inset 0 0 20px rgba(0,234,255,.03);
  display: flex;
  align-items: center;
  font-size: 16px;
  color: var(--text);
}

.message-box strong { color: white; }

.stop-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
}

.stop-btn {
  width: 132px;
  height: 132px;
  border-radius: 999px;
  color: white;
  font-size: 26px;
  letter-spacing: .06em;
  background:
    radial-gradient(circle at 30% 30%, #ff9ab0 0%, #ff4d6d 42%, #b31244 100%);
  box-shadow:
    0 18px 30px rgba(255,77,109,.28),
    0 0 30px rgba(255,77,109,.18),
    inset 0 4px 12px rgba(255,255,255,.25),
    inset 0 -8px 18px rgba(0,0,0,.18);
  position: relative;
}

.stop-btn::before {
  content: "";
  position: absolute;
  inset: 10px;
  border-radius: inherit;
  border: 1px solid rgba(255,255,255,.20);
  pointer-events: none;
}

.stop-btn.small-cooldown {
  animation: pulse 1s infinite;
}

.hint-box {
  min-height: 64px;
  padding: 12px 14px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: inset 0 0 20px rgba(138,92,255,.03);
  color: var(--muted);
  font-size: 14px;
}

.combo-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(255,179,3,.22), rgba(138,92,255,.16));
  border: 1px solid rgba(255,179,3,.24);
  font-weight: 800;
  color: #ffe08a;
  box-shadow: 0 8px 20px rgba(255,179,3,.10);
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(2,6,23,.78);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 24px;
  z-index: 10;
  backdrop-filter: blur(10px);
}

.overlay.open { display: flex; }

.modal {
  width: min(680px, 100%);
  padding: 28px;
  border-radius: 28px;
  background:
    linear-gradient(180deg, rgba(12,18,34,.98), rgba(20,30,50,.96));
  border: 1px solid rgba(255,255,255,.08);
  box-shadow:
    0 30px 70px rgba(0,0,0,.45),
    0 0 28px rgba(0,234,255,.08);
  text-align: center;
}

.modal h2 {
  margin: 0 0 10px;
  font-size: clamp(28px, 3vw, 40px);
  letter-spacing: -0.02em;
}

.modal p {
  color: var(--muted);
  font-size: 16px;
  line-height: 1.5;
  margin: 8px 0;
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 22px 0;
}

.result-item {
  padding: 16px;
  border-radius: 18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025));
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: inset 0 0 16px rgba(0,234,255,.03);
}

.result-item strong {
  display: block;
  font-size: 28px;
  margin-bottom: 6px;
}

.modal-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.primary-btn, .ghost-btn {
  padding: 14px 18px;
  min-width: 180px;
  border-radius: 16px;
  font-weight: 800;
}

.primary-btn {
  color: var(--button-text);
  background: linear-gradient(135deg, #00eaff, #2aff8c);
  box-shadow: 0 16px 24px rgba(0,234,255,.16);
}

.ghost-btn {
  color: var(--text);
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.09);
}

.countdown {
  color: #ffe08a;
  font-weight: 800;
}

.confetti {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 11;
}

.confetti-piece {
  position: absolute;
  top: -20px;
  width: 12px;
  height: 18px;
  opacity: .9;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {

}

@keyframes pulse {

  50% { transform: scale(1.03); }

}

@media (max-width: 960px) {

  .status-card, .bonus-card { min-height: auto; }

}

@media (max-width: 680px) {

  .horizontal-zone { height: 112px; }
  .player-token { width: 38px; height: 38px; font-size: 20px; }
}
  </style>
</head>
<body>
  <div id="moment-of-truth-root"></div>

  <script>
    (function () {
      'use strict';

      const DEFAULT_CONFIG = {
        content: { title: 'Moment Of Truth' },
        gameplay: {

          stepsToFinish: 5,
          continueMode: 'auto',

        },

        },

        },
        scoring: {

        },

          energyGainCorrect: 30,

        },
        perfect: {
          enabled: true,
          thresholdRatio: 0.12,
          text: 'PERFECT!'
        },
        achievements: {
          enabled: true,
          list: [
            { id: 'combo3', check: 'combo3', title: 'Ачивка', text: 'Серия 3 подряд' },
            { id: 'combo5', check: 'combo5', title: 'Ачивка', text: 'Серия 5 подряд' },
            { id: 'perfect3', check: 'perfect3', title: 'Снайпер', text: '3 Perfect подряд' },
            { id: 'survivor', check: 'survivor', title: 'Спасение', text: 'Победа с 1 жизнью' },
            { id: 'cool', check: 'cool', title: 'Хладнокровие', text: 'Победа без Freeze' }
          ]
        },
        audio: {

        },
        messages: {

          combo: {
            2: 'Отлично! Комбо x2',
            3: 'Серия x3!',
            5: 'Мастер! Комбо x5'
          },
          perfect: ['Идеально!', 'Точное попадание!', 'Perfect!'],
          lastChance: 'Последний шанс!'
        },
        debug: false
      };

      const DEFAULT_QUESTIONS = [
        {
          id: 'question_1',
          question: 'Какое число является простым?',
          answers: ['9', '11', '15'],
          correct_index: 1,
          speed: 340,
          mode: 'normal'
        },
        {
          id: 'question_2',
          question: 'Какая планета известна как Красная планета?',
          answers: ['Венера', 'Марс', 'Сатурн'],
          correct_index: 1,
          speed: 360,
          mode: 'speed'
        },
        {
          id: 'question_3',
          question: 'Сколько будет 6 × 7?',
          answers: ['42', '36', '48'],
          correct_index: 0,
          speed: 300,
          mode: 'safe'
        },
        {
          id: 'question_4',
          question: 'Какой океан самый большой?',
          answers: ['Атлантический', 'Индийский', 'Тихий'],
          correct_index: 2,
          speed: 320,
          mode: 'double_step'
        },
        {
          id: 'question_5',
          question: 'Какой газ растения поглощают из воздуха?',
          answers: ['Кислород', 'Углекислый газ', 'Азот'],
          correct_index: 1,
          speed: 390,
          mode: 'boss'
        }
      ];

      function deepMerge(target, source) {
        const output = Array.isArray(target) ? target.slice() : { ...target };
        if (!source || typeof source !== 'object') return output;
        Object.keys(source).forEach((key) => {
          const value = source[key];
          if (Array.isArray(value)) output[key] = value.slice();
          else if (value && typeof value === 'object') {
            output[key] = deepMerge(output[key] && typeof output[key] === 'object' ? output[key] : {}, value);
          } else output[key] = value;
        });
        return output;
      }
      const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
      const percent = (value, total) => total ? Math.round((value / total) * 100) : 0;
      const randomFrom = (arr) => arr[Math.floor(Math.random() * arr.length)];
      const truncateText = (text, maxLength) => typeof text !== 'string' ? '' : (text.length > maxLength ? text.slice(0, maxLength - 1) + '…' : text);

      function validateQuestions(questions, maxAnswerLength) {
        if (!Array.isArray(questions) || !questions.length) throw new Error('Questions array is empty.');
        questions.forEach((q, index) => {
          if (!q || typeof q !== 'object') throw new Error(`Question at index ${index} is invalid.`);
          if (!Array.isArray(q.answers) || q.answers.length < 3 || q.answers.length > 5) throw new Error(`Question "${q.id || index}" must contain 3..5 answers.`);
          if (typeof q.correct_index !== 'number' || q.correct_index < 0 || q.correct_index >= q.answers.length) throw new Error(`Question "${q.id || index}" has invalid correct_index.`);
          q.answers.forEach((answer, answerIndex) => {
            if (String(answer).length > maxAnswerLength) throw new Error(`Answer ${answerIndex} in "${q.id || index}" exceeds maxAnswerLength (${maxAnswerLength}).`);
          });
        });
      }

      function createAudioManager(configRef) {
        let ctx = null;
        let freezeLoopNodes = null;
        let freezeLfoNodes = null;
        let scoreTickTimer = null;

        function ensureContext() {
          if (!configRef.audio.enabled) return null;
          if (!ctx) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            ctx = new AudioContextClass();
          }
          if (ctx.state === 'suspended') ctx.resume().catch(() => {});
          return ctx;
        }

        function beep(freq, duration, type, volumeMultiplier = 1) {
          const audioCtx = ensureContext();
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const now = audioCtx.currentTime;
          const volume = clamp(Number(configRef.audio.volume || 0.05) * volumeMultiplier, 0, 1);
          osc.type = type || 'sine';
          osc.frequency.setValueAtTime(freq, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(volume, 0.0001), now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + duration + 0.02);
        }

        function startFreezeLoop() {
          const audioCtx = ensureContext();
          if (!audioCtx || freezeLoopNodes) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const lfo = audioCtx.createOscillator();
          const lfoGain = audioCtx.createGain();
          const now = audioCtx.currentTime;
          const baseVolume = clamp(Number(configRef.audio.volume || 0.05) * 0.18, 0, 0.08);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(460, now);
          lfo.type = 'sine';
          lfo.frequency.setValueAtTime(3.2, now);
          lfoGain.gain.setValueAtTime(0.02, now);
          lfo.connect(lfoGain);
          lfoGain.connect(gain.gain);
          gain.gain.setValueAtTime(baseVolume, now);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          lfo.start(now);
          freezeLoopNodes = { osc, gain };
          freezeLfoNodes = { lfo, lfoGain };
        }

        function stopFreezeLoop() {
          if (!ctx || !freezeLoopNodes) return;
          const now = ctx.currentTime;
          try {
            freezeLoopNodes.gain.gain.cancelScheduledValues(now);
            freezeLoopNodes.gain.gain.setValueAtTime(freezeLoopNodes.gain.gain.value || 0.01, now);
            freezeLoopNodes.gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
            freezeLoopNodes.osc.stop(now + 0.1);
            freezeLfoNodes.lfo.stop(now + 0.1);
          } catch (e) {}
          freezeLoopNodes = null;
          freezeLfoNodes = null;
        }

        function startScoreTicks(durationMs = 1000) {
          if (scoreTickTimer) clearInterval(scoreTickTimer);
          const interval = Number(configRef.audio.scoreTickIntervalMs || 40);
          scoreTickTimer = setInterval(() => {
            beep(700 + Math.random() * 120, 0.04, 'square', 0.35);
          }, interval);
          setTimeout(() => {
            if (scoreTickTimer) clearInterval(scoreTickTimer);
            scoreTickTimer = null;
            beep(980, 0.15, 'triangle', 0.8);
          }, durationMs);
        }

        return {
          correct() { beep(720, 0.16, 'triangle', 1); setTimeout(() => beep(960, 0.18, 'triangle', 1), 70); },
          wrong() { beep(220, 0.2, 'sawtooth', 1); setTimeout(() => beep(180, 0.16, 'sawtooth', 1), 80); },
          click() { beep(520, 0.06, 'square', 0.9); },
          freezeStart() { beep(420, 0.14, 'sine', 1.1); setTimeout(() => beep(520, 0.14, 'sine', 1.1), 90); startFreezeLoop(); },
          freezeStop() { beep(680, 0.08, 'triangle', 0.9); stopFreezeLoop(); },
          fifty() { beep(600, 0.08, 'square', 1); setTimeout(() => beep(760, 0.08, 'square', 1), 60); },
          perfect() { beep(980, 0.12, 'triangle', 1.15); setTimeout(() => beep(1220, 0.12, 'triangle', 1.15), 80); },
          achievement() { beep(880, 0.1, 'triangle', 0.9); setTimeout(() => beep(1180, 0.16, 'triangle', 0.9), 90); },
          scoreCount(durationMs) { startScoreTicks(durationMs); },
          shutdown() {
            stopFreezeLoop();
            if (scoreTickTimer) clearInterval(scoreTickTimer);
            scoreTickTimer = null;
          }
        };
      }

      function createGame() {
        let rootEl = null;
        let config = deepMerge({}, DEFAULT_CONFIG);
        let questions = DEFAULT_QUESTIONS.slice();
        let rafId = 0;
        let lastTs = 0;
        let roundTimeout = null;
        let freezeInterval = null;
        let resizeObserver = null;
        let audio = createAudioManager(config);
        let scoreAnimFrame = 0;

        const state = {
          status: 'idle',
          currentQuestionIndex: 0,
          lives: 3,
          correctAnswers: 0,
          wrongAnswers: 0,
          combo: 0,
          bestCombo: 0,
          perfectAnswers: 0,
          perfectStreak: 0,
          progressStep: 0,
          stepsToFinish: 5,
          accuracy: 0,
          score: 0,
          displayedScore: 0,
          scoreAnimating: false,
          energy: 0,
          achievementsUnlocked: [],
          usedFreezeAnyTime: false,
          indicator: {
            position: 0,
            direction: 1,
            speed: 300,
            movementType: 'pingpong'
          },
          bonuses: {
            freezeActive: false,
            freezeRemainingMs: 0,
            freezeResumeStatus: null
          },
          currentRound: {
            selectedIndex: null,
            correctIndex: null,
            result: null,
            stopAvailableAt: 0,
            hiddenIndices: [],
            visibleIndices: [],
            questionId: null,
            isPerfect: false,
            awardedScore: 0,
            mode: 'normal',
            stepGain: 1,
            energyGain: 0
          }
        };

        const dom = {};
        function emit(eventName, detail) { if (rootEl) rootEl.dispatchEvent(new CustomEvent(eventName, { detail })); }

        function destroyTimers() {
          if (rafId) cancelAnimationFrame(rafId);
          rafId = 0;
          if (scoreAnimFrame) cancelAnimationFrame(scoreAnimFrame);
          scoreAnimFrame = 0;
          if (roundTimeout) clearTimeout(roundTimeout);
          roundTimeout = null;
          if (freezeInterval) clearInterval(freezeInterval);
          freezeInterval = null;
          audio.freezeStop();
          lastTs = 0;
        }

        const getCurrentQuestion = () => questions[state.currentQuestionIndex];
        const getTotalAnswered = () => state.correctAnswers + state.wrongAnswers;
        function updateAccuracy() {
          state.accuracy = getTotalAnswered() > 0 ? Math.round((state.correctAnswers / getTotalAnswered()) * 100) : 0;
        }

        function getLifeIcons() {
          const maxLives = config.gameplay.lives;
          const currentLives = state.lives;
          let out = '';
          const icon = config.ui.lifeDisplay === 'hearts' ? '♥' : '●';
          for (let i = 0; i < maxLives; i++) {
            out += i < currentLives ? icon : '♡';
            if (i < maxLives - 1) out += ' ';
          }
          return out;
        }

        function getComboMessage(combo) {
          if (config.messages.combo[combo]) return config.messages.combo[combo];
          if (combo >= 5) return config.messages.combo[5];
          if (combo >= 3) return config.messages.combo[3];
          if (combo >= 2) return config.messages.combo[2];
          return '';
        }

        function questionModeClass(mode) {
          if (mode === 'boss') return 'mot-question--boss';
          if (mode === 'speed') return 'mot-question--speed';
          if (mode === 'safe') return 'mot-question--safe';
          if (mode === 'double_step') return 'mot-question--double';
          return '';
        }

        function getBonusAvailable(type) {
          const energy = state.energy;
          if (type === 'freeze') return energy >= Number(config.bonuses.freezeCost || 100);
          if (type === 'fifty') return energy >= Number(config.bonuses.fiftyCost || 60);
          return false;
        }

        function spendEnergy(amount) {
          state.energy = clamp(state.energy - amount, 0, Number(config.bonuses.energyMax || 100));
        }

        function gainEnergy(amount) {
          state.energy = clamp(state.energy + amount, 0, Number(config.bonuses.energyMax || 100));
        }

        function animateScoreTo(target, durationMs = 800) {
          if (scoreAnimFrame) cancelAnimationFrame(scoreAnimFrame);
          const start = state.displayedScore;
          const diff = target - start;
          const startTime = performance.now();
          state.scoreAnimating = true;
          audio.scoreCount(durationMs);
          function frame(now) {
            const progress = clamp((now - startTime) / durationMs, 0, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            state.displayedScore = Math.round(start + diff * eased);
            render();
            if (progress < 1) scoreAnimFrame = requestAnimationFrame(frame);
            else {
              state.displayedScore = target;
              state.scoreAnimating = false;
              scoreAnimFrame = 0;
              render();
            }
          }
          scoreAnimFrame = requestAnimationFrame(frame);
        }

        function showToast(title, text, type = 'achievement') {
          if (!dom.toastLayer) return;
          const el = document.createElement('div');
          el.className = `mot-toast mot-toast--${type}`;
          el.innerHTML = `<div class="mot-toast__title">${title}</div><div class="mot-toast__text">${text}</div>`;
          dom.toastLayer.appendChild(el);
          setTimeout(() => el.classList.add('mot-toast--out'), 1800);
          setTimeout(() => el.remove(), 2100);
        }

        function triggerPerfectBurst() {
          dom.perfectBurst.classList.remove('mot-perfect-burst--show');
          void dom.perfectBurst.offsetWidth;
          dom.perfectBurst.textContent = config.perfect.text || 'PERFECT!';
          dom.perfectBurst.classList.add('mot-perfect-burst--show');
        }

        function triggerShake() {
          dom.mainPanel.classList.remove('mot-shake');
          void dom.mainPanel.offsetWidth;
          dom.mainPanel.classList.add('mot-shake');
        }

        function maybeUnlockAchievement(code) {
          if (!config.achievements.enabled) return;
          const found = (config.achievements.list || []).find((item) => item.check === code);
          if (!found) return;
          if (state.achievementsUnlocked.includes(found.id)) return;
          state.achievementsUnlocked.push(found.id);
          audio.achievement();
          showToast(found.title, found.text, 'achievement');
        }

        function checkAchievementsOnCorrect() {
          if (state.combo >= 3) maybeUnlockAchievement('combo3');
          if (state.combo >= 5) maybeUnlockAchievement('combo5');
          if (state.perfectStreak >= 3) maybeUnlockAchievement('perfect3');
        }

        function checkAchievementsOnWin() {
          if (state.lives <= 1) maybeUnlockAchievement('survivor');
          if (!state.usedFreezeAnyTime) maybeUnlockAchievement('cool');
        }

        function spawnConfetti(count = 80) {
          if (!dom.confettiLayer) return;
          dom.confettiLayer.innerHTML = '';
          const colors = ['#22c55e', '#38bdf8', '#f59e0b', '#ef4444', '#a78bfa', '#fde68a'];
          for (let i = 0; i < count; i++) {
            const piece = document.createElement('div');
            piece.className = 'mot-confetti';
            piece.style.left = `${Math.random() * 100}%`;
            piece.style.background = colors[i % colors.length];
            piece.style.animationDuration = `${3.2 + Math.random() * 2.2}s`;
            piece.style.animationDelay = `${Math.random() * 0.35}s`;
            piece.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
            dom.confettiLayer.appendChild(piece);
          }
        }

        function render() {
          if (!rootEl) return;
          updateAccuracy();
          const question = getCurrentQuestion();
          const answers = question ? question.answers : [];
          const segments = answers.length || 1;
          const segmentColumns = `repeat(${segments}, minmax(0, 1fr))`;

          dom.currentQuestionIndex.textContent = String(state.currentQuestionIndex + 1);
          dom.questionsTotal.textContent = String(questions.length);
          dom.combo.textContent = `x${state.combo}`;
          dom.bestCombo.textContent = `x${state.bestCombo}`;
          dom.accuracy.textContent = `${state.accuracy}%`;
          dom.lives.textContent = getLifeIcons();
          dom.score.textContent = String(state.displayedScore);
          dom.status.textContent = state.status;
          dom.goal.textContent = String(config.gameplay.stepsToFinish);
          dom.perfectCount.textContent = String(state.perfectAnswers);
          dom.questionText.textContent = question ? question.question : '—';
          dom.questionBox.className = `mot-panel mot-question ${questionModeClass(question && question.mode)}`.trim();
          dom.scoreStat.classList.toggle('mot-stat--highlight', state.combo >= 3 || state.scoreAnimating);
          dom.score.classList.toggle('mot-score-counting', state.scoreAnimating);
          dom.lifeStat.classList.toggle('mot-stat--danger', state.lives <= Number(config.gameplay.lastChanceLivesThreshold || 1));

          dom.stopButton.disabled = !(
            state.status === 'indicator_moving' && performance.now() >= state.currentRound.stopAvailableAt && !state.bonuses.freezeActive
          );
          dom.freezeButton.disabled = !(state.status === 'indicator_moving' && getBonusAvailable('freeze'));
          dom.fiftyButton.disabled = !(state.status === 'indicator_moving' && getBonusAvailable('fifty'));
          dom.freezeButton.classList.toggle('mot-btn--bonus-ready', getBonusAvailable('freeze'));
          dom.freezeButton.classList.toggle('mot-btn--freeze-active', state.bonuses.freezeActive);
          dom.fiftyButton.classList.toggle('mot-btn--bonus-ready', getBonusAvailable('fifty'));
          dom.freezeButton.textContent = state.bonuses.freezeActive ? 'Freeze активен' : `Freeze (${config.bonuses.freezeCost})`;
          dom.fiftyButton.textContent = `50/50 (${config.bonuses.fiftyCost})`;

          const timerVisible = state.bonuses.freezeActive;
          dom.timerPill.classList.toggle('mot-timer__pill--visible', timerVisible);
          dom.timerValue.textContent = timerVisible ? `${Math.ceil(state.bonuses.freezeRemainingMs / 1000)} c` : '';

          const energyMax = Number(config.bonuses.energyMax || 100);
          dom.energyValue.textContent = `${state.energy}/${energyMax}`;
          dom.energyFill.style.width = `${percent(state.energy, energyMax)}%`;

          dom.railSegments.style.gridTemplateColumns = segmentColumns;
          dom.answerBand.style.gridTemplateColumns = segmentColumns;
          dom.rail.classList.toggle('mot-rail--hide-borders', !config.ui.showSegmentBorders);
          dom.answerBand.classList.toggle('mot-answer-band--hide-borders', !config.ui.showSegmentBorders);
          dom.railSegments.innerHTML = '';
          dom.answerBand.innerHTML = '';

          answers.forEach((answer, index) => {
            const segmentEl = document.createElement('div');
            segmentEl.className = 'mot-rail__segment';
            if (state.currentRound.result === 'correct' && index === state.currentRound.correctIndex) segmentEl.classList.add('mot-rail__segment--correct');
            if (state.currentRound.result === 'wrong') {
              if (index === state.currentRound.correctIndex) segmentEl.classList.add('mot-rail__segment--correct');
              if (index === state.currentRound.selectedIndex) segmentEl.classList.add('mot-rail__segment--wrong');
            }
            dom.railSegments.appendChild(segmentEl);

            const cellEl = document.createElement('div');
            cellEl.className = 'mot-answer-band__cell';
            cellEl.textContent = truncateText(String(answer), config.gameplay.maxAnswerLength);
            if (state.currentRound.hiddenIndices.includes(index)) cellEl.classList.add('mot-answer-band__cell--hidden');
            if (state.currentRound.result === 'correct' && index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--correct');
            if (state.currentRound.result === 'wrong') {
              if (index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--correct');
              if (index === state.currentRound.selectedIndex) cellEl.classList.add('mot-answer-band__cell--wrong');
            }
            if (state.currentRound.isPerfect && index === state.currentRound.correctIndex) cellEl.classList.add('mot-answer-band__cell--perfect');
            dom.answerBand.appendChild(cellEl);
          });

          renderProgressTrack();
          renderIndicator();
          renderBanner();
          renderFinalScreen();
        }

        function renderProgressTrack() {
          dom.trackFill.style.width = `${percent(state.progressStep, state.stepsToFinish)}%`;
          dom.trackTicks.innerHTML = '';
          dom.trackTicks.style.gridTemplateColumns = `repeat(${state.stepsToFinish}, minmax(0, 1fr))`;
          for (let i = 0; i < state.stepsToFinish; i++) {
            const tick = document.createElement('div');
            tick.className = 'mot-track__tick';
            dom.trackTicks.appendChild(tick);
          }
          const progressRatio = clamp(state.progressStep / state.stepsToFinish, 0, 1);
          dom.trackRunner.style.left = `${progressRatio * 100}%`;
          if (config.progress.playerTokenImage) {
            dom.trackRunner.innerHTML = `<img src="${config.progress.playerTokenImage}" alt="player token" style="width:30px;height:30px;object-fit:contain;">`;
          } else dom.trackRunner.textContent = config.progress.playerToken || '🏃';
          dom.trackFinish.textContent = config.progress.finishIcon || '🏁';
        }

        function renderIndicator() {
          const railRect = dom.rail.getBoundingClientRect();
          const width = railRect.width || dom.rail.clientWidth || 1;
          const x = clamp(state.indicator.position * width, 0, width);
          dom.indicator.style.left = `${x}px`;
          dom.indicator.classList.toggle('mot-indicator--frozen', state.bonuses.freezeActive);
        }

        function renderBanner() {
          dom.banner.className = 'mot-banner';
          if (state.status === 'question_ready' || state.status === 'indicator_moving') {
            dom.banner.classList.add('mot-banner--info');
            if (state.lives <= Number(config.gameplay.lastChanceLivesThreshold || 1)) {
              dom.banner.textContent = config.messages.lastChance || 'Последний шанс!';
              return;
            }
            if (state.bonuses.freezeActive) {
              dom.banner.textContent = 'Индикатор заморожен. Следи за таймером Freeze.';
              return;
            }
            const comboMessage = getComboMessage(state.combo);
            const energyHint = getBonusAvailable('freeze') || getBonusAvailable('fifty') ? ' Бонус заряжен.' : '';
            dom.banner.textContent = (comboMessage || 'Останови индикатор в зоне правильного ответа.') + energyHint;
            return;
          }
          if (state.currentRound.isPerfect && state.currentRound.result === 'correct') {
            dom.banner.classList.add('mot-banner--perfect');
            dom.banner.textContent = `${randomFrom(config.messages.perfect)} +${state.currentRound.awardedScore}`;
            return;
          }
          if (state.currentRound.result === 'correct') {
            dom.banner.classList.add('mot-banner--correct');
            const comboMessage = getComboMessage(state.combo);
            dom.banner.textContent = `${comboMessage || randomFrom(config.messages.correct)} +${state.currentRound.awardedScore}`;
            return;
          }
          if (state.currentRound.result === 'wrong') {
            dom.banner.classList.add('mot-banner--wrong');
            dom.banner.textContent = randomFrom(config.messages.wrong);
            return;
          }
          dom.banner.classList.add('mot-banner--info');
          dom.banner.textContent = 'Готов к следующему вопросу.';
        }

        function renderFinalScreen() {
          const visible = state.status === 'game_win' || state.status === 'game_lose';
          dom.final.classList.toggle('mot-final--visible', visible);
          if (!visible) return;
          const won = state.status === 'game_win';
          dom.finalTitle.textContent = won ? 'Победа!' : 'Игра окончена';
          dom.finalSubtitle.textContent = won ? 'Ты успешно прошел трек до финиша.' : 'Жизни закончились. Попробуй еще раз.';
          dom.finalCorrect.textContent = String(state.correctAnswers);
          dom.finalWrong.textContent = String(state.wrongAnswers);
          dom.finalProgress.textContent = `${percent(state.progressStep, state.stepsToFinish)}%`;
          dom.finalAccuracy.textContent = `${state.accuracy}%`;
          dom.finalScore.textContent = String(state.displayedScore);
        }

        function setStatus(nextStatus) { state.status = nextStatus; render(); }

        function computeSelectedSegment() {
          const question = getCurrentQuestion();
          const totalSegments = question.answers.length;
          const width = 1 / totalSegments;
          const rawIndex = Math.floor(clamp(state.indicator.position, 0, 0.999999) / width);
          return clamp(rawIndex, 0, totalSegments - 1);
        }

        function isPerfectHit(question, selectedIndex) {
          if (!config.perfect.enabled) return false;
          if (selectedIndex !== question.correct_index) return false;
          const totalSegments = question.answers.length;
          const segmentWidth = 1 / totalSegments;
          const segmentStart = selectedIndex * segmentWidth;
          const center = segmentStart + segmentWidth / 2;
          const threshold = segmentWidth * Number(config.perfect.thresholdRatio || 0.12);
          return Math.abs(state.indicator.position - center) <= threshold;
        }

        function resetRoundState() {
          state.currentRound.selectedIndex = null;
          state.currentRound.correctIndex = null;
          state.currentRound.result = null;
          state.currentRound.hiddenIndices = [];
          state.currentRound.visibleIndices = [];
          state.currentRound.questionId = null;
          state.currentRound.isPerfect = false;
          state.currentRound.awardedScore = 0;
          state.currentRound.mode = 'normal';
          state.currentRound.stepGain = 1;
          state.currentRound.energyGain = 0;
        }

        function loadQuestion(index) {
          const question = questions[index];
          if (!question) return;
          resetRoundState();
          state.currentRound.questionId = question.id;
          state.currentRound.correctIndex = question.correct_index;
          state.currentRound.visibleIndices = question.answers.map((_, i) => i);
          state.currentRound.mode = question.mode || 'normal';
          state.indicator.position = 0;
          state.indicator.direction = 1;
          state.indicator.speed = Number(question.speed || config.movement.defaultSpeed || 300);
          state.indicator.movementType = config.movement.movementType || 'pingpong';
          state.currentRound.stopAvailableAt = performance.now() + Number(config.movement.minStopDelayMs || 800);
          emit('QUESTION_LOAD', { index, question });
          setStatus('question_ready');
        }

        function tick(ts) {
          if (!lastTs) lastTs = ts;
          const delta = (ts - lastTs) / 1000;
          lastTs = ts;
          if (state.status === 'indicator_moving' && !state.bonuses.freezeActive) {
            const railRect = dom.rail.getBoundingClientRect();
            const width = Math.max(railRect.width, 1);
            const speedPxPerSec = state.indicator.speed;
            const speedNorm = speedPxPerSec / width;
            let nextPos = state.indicator.position + speedNorm * delta * state.indicator.direction;
            if (state.indicator.movementType === 'pingpong') {
              if (nextPos >= 1) { nextPos = 1 - (nextPos - 1); state.indicator.direction = -1; }
              else if (nextPos <= 0) { nextPos = Math.abs(nextPos); state.indicator.direction = 1; }
            } else {
              if (nextPos >= 1) nextPos = nextPos - 1;
              if (nextPos < 0) nextPos = 1 + nextPos;
            }
            state.indicator.position = clamp(nextPos, 0, 1);
            renderIndicator();
            if (performance.now() >= state.currentRound.stopAvailableAt) dom.stopButton.disabled = false;
          }
          rafId = requestAnimationFrame(tick);
        }

        function startIndicator() {
          if (state.status !== 'question_ready' && state.status !== 'transition_next') return;
          emit('INDICATOR_START', { questionIndex: state.currentQuestionIndex });
          setStatus('indicator_moving');
        }

        function useFreeze() {
          if (!(state.status === 'indicator_moving' && getBonusAvailable('freeze'))) return;
          spendEnergy(Number(config.bonuses.freezeCost || 100));
          state.bonuses.freezeActive = true;
          state.bonuses.freezeRemainingMs = Number(config.bonuses.freezeDurationMs || 10000);
          state.bonuses.freezeResumeStatus = 'indicator_moving';
          state.usedFreezeAnyTime = true;
          emit('BONUS_USE_FREEZE', { freezeDurationMs: state.bonuses.freezeRemainingMs });
          audio.freezeStart();
          render();
          const startedAt = Date.now();
          freezeInterval = setInterval(() => {
            const elapsed = Date.now() - startedAt;
            state.bonuses.freezeRemainingMs = Math.max(0, Number(config.bonuses.freezeDurationMs || 10000) - elapsed);
            render();
            if (state.bonuses.freezeRemainingMs <= 0) {
              clearInterval(freezeInterval);
              freezeInterval = null;
              state.bonuses.freezeActive = false;
              state.bonuses.freezeRemainingMs = 0;
              audio.freezeStop();
              render();
            }
          }, 100);
        }

        function useFifty() {
          if (!(state.status === 'indicator_moving' && getBonusAvailable('fifty'))) return;
          const question = getCurrentQuestion();
          const wrongIndices = question.answers.map((_, i) => i).filter((i) => i !== question.correct_index);
          if (wrongIndices.length <= 1) return;
          const keptWrongIndex = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
          const hide = wrongIndices.filter((i) => i !== keptWrongIndex).slice(0, 2);
          spendEnergy(Number(config.bonuses.fiftyCost || 60));
          state.currentRound.hiddenIndices = hide;
          emit('BONUS_USE_FIFTY', { hiddenIndices: hide, keptWrongIndex });
          audio.fifty();
          render();
        }

        function calculateRoundRewards(question, isCorrect, isPerfect) {
          let awardedScore = 0;
          let stepGain = 0;
          let energyGain = 0;
          if (!isCorrect) return { awardedScore, stepGain, energyGain };
          const comboMultiplier = Math.min(state.combo, Number(config.scoring.comboCap || 5)) * Number(config.scoring.comboStep || 50);
          awardedScore += Number(config.scoring.baseCorrect || 100) + comboMultiplier;
          energyGain += Number(config.bonuses.energyGainCorrect || 30);
          stepGain = 1;
          if (question.mode === 'speed') awardedScore = Math.round(awardedScore * Number(config.scoring.speedRoundMultiplier || 1.5));
          if (question.mode === 'boss') awardedScore = Math.round(awardedScore * Number(config.scoring.bossRoundMultiplier || 2));
          if (question.mode === 'double_step') {
            stepGain = 2;
            awardedScore += Number(config.scoring.doubleStepBonus || 50);
          }
          if (isPerfect) {
            awardedScore += Number(config.scoring.perfectBonus || 100);
            energyGain += Number(config.bonuses.energyGainPerfect || 20);
          }
          return { awardedScore, stepGain, energyGain };
        }

        function checkAnswer() {
          if (state.status !== 'indicator_stopped') return;
          const question = getCurrentQuestion();
          const isCorrect = state.currentRound.selectedIndex === question.correct_index;
          const perfectHit = isPerfectHit(question, state.currentRound.selectedIndex);
          state.currentRound.correctIndex = question.correct_index;
          state.currentRound.result = isCorrect ? 'correct' : 'wrong';
          state.currentRound.isPerfect = perfectHit;
          emit('ANSWER_CHECK', { selectedIndex: state.currentRound.selectedIndex, correctIndex: question.correct_index, isCorrect, perfectHit });

          if (isCorrect) {
            state.combo += 1;
            state.bestCombo = Math.max(state.bestCombo, state.combo);
            state.correctAnswers += 1;
            state.perfectStreak = perfectHit ? state.perfectStreak + 1 : 0;
            if (perfectHit) state.perfectAnswers += 1;
            const rewards = calculateRoundRewards(question, true, perfectHit);
            state.currentRound.awardedScore = rewards.awardedScore;
            state.currentRound.stepGain = rewards.stepGain;
            state.currentRound.energyGain = rewards.energyGain;
            state.progressStep += rewards.stepGain;
            state.score += rewards.awardedScore;
            gainEnergy(rewards.energyGain);
            animateScoreTo(state.score, Number(config.gameplay.scoreCountDurationMs || 1200));
            if (perfectHit) {
              audio.perfect();
              triggerPerfectBurst();
              showToast('Perfect', `+${rewards.awardedScore} очков`, 'perfect');
            } else {
              audio.correct();
            }
            checkAchievementsOnCorrect();
            emit('ANSWER_CORRECT', { progressStep: state.progressStep, combo: state.combo, awardedScore: rewards.awardedScore });
          } else {
            const safeRound = question.mode === 'safe' && config.gameplay.safeRoundNoLifeLoss;
            if (!safeRound) state.lives -= 1;
            state.wrongAnswers += 1;
            state.combo = 0;
            state.perfectStreak = 0;
            state.currentRound.awardedScore = 0;
            state.currentRound.stepGain = 0;
            state.currentRound.energyGain = -Number(config.bonuses.energyLossWrong || 20);
            gainEnergy(-Number(config.bonuses.energyLossWrong || 20));
            audio.wrong();
            triggerShake();
            emit('ANSWER_WRONG', { lives: state.lives, safeRound });
          }

          updateAccuracy();
          setStatus('showing_result');

          if (state.progressStep >= state.stepsToFinish) {
            roundTimeout = setTimeout(() => {
              checkAchievementsOnWin();
              emit('GAME_WIN', { state: getPublicState() });
              setStatus('game_win');
              spawnConfetti(100);
            }, 1100);
            return;
          }
          if (state.lives <= 0) {
            roundTimeout = setTimeout(() => {
              emit('GAME_LOSE', { state: getPublicState() });
              setStatus('game_lose');
            }, 1100);
            return;
          }
          roundTimeout = setTimeout(() => nextQuestion(), Number(config.ui.autoNextDelayMs || 1700));
        }

        function stopIndicator() {
          if (state.status !== 'indicator_moving') return;
          if (performance.now() < state.currentRound.stopAvailableAt) return;
          if (state.bonuses.freezeActive) return;
          state.currentRound.selectedIndex = computeSelectedSegment();
          emit('INDICATOR_STOP', { indicatorPosition: state.indicator.position, selectedIndex: state.currentRound.selectedIndex });
          setStatus('indicator_stopped');
          checkAnswer();
        }

        function nextQuestion() {
          if (state.status === 'game_win' || state.status === 'game_lose') return;
          state.currentQuestionIndex = (state.currentQuestionIndex + 1) % questions.length;
          emit('NEXT_QUESTION', { currentQuestionIndex: state.currentQuestionIndex });
          loadQuestion(state.currentQuestionIndex);
          roundTimeout = setTimeout(() => startIndicator(), 260);
        }

        function getPublicState() {
          return JSON.parse(JSON.stringify({
            status: state.status,
            currentQuestionIndex: state.currentQuestionIndex,
            lives: state.lives,
            correctAnswers: state.correctAnswers,
            wrongAnswers: state.wrongAnswers,
            combo: state.combo,
            bestCombo: state.bestCombo,
            perfectAnswers: state.perfectAnswers,
            progressStep: state.progressStep,
            stepsToFinish: state.stepsToFinish,
            accuracy: state.accuracy,
            score: state.score,
            displayedScore: state.displayedScore,
            energy: state.energy,
            achievementsUnlocked: state.achievementsUnlocked,
            indicator: state.indicator,
            bonuses: state.bonuses,
            currentRound: state.currentRound
          }));
        }

        function attachEvents() {
          dom.stopButton.addEventListener('click', () => { audio.click(); stopIndicator(); });
          dom.freezeButton.addEventListener('click', () => { audio.click(); useFreeze(); });
          dom.fiftyButton.addEventListener('click', () => { audio.click(); useFifty(); });

        function resetState() {
          state.status = 'idle';
          state.currentQuestionIndex = 0;

          state.progressStep = 0;

          state.accuracy = 0;
          state.score = 0;
          state.displayedScore = 0;

          state.energy = 0;
          state.achievementsUnlocked = [];

        const api = {
          init(userConfig = {}, userQuestions = null, mountTarget = '#moment-of-truth-root') {
            destroyTimers();
            config = deepMerge(DEFAULT_CONFIG, userConfig || {});
            audio = createAudioManager(config);
            const nextQuestions = Array.isArray(userQuestions) ? userQuestions : questions;
            validateQuestions(nextQuestions, config.gameplay.maxAnswerLength);
            questions = nextQuestions.map((q) => ({ ...q, answers: q.answers.slice() }));
            const mountEl = typeof mountTarget === 'string' ? document.querySelector(mountTarget) : mountTarget;
            if (!mountEl) throw new Error('Mount element not found.');
            buildDOM(mountEl);
            resetState();
            emit('GAME_INIT', { config, questions });
            loadQuestion(0);
            render();
            return this;
          },
          start() {
            if (!rootEl) throw new Error('Call MomentOfTruth.init(config) before start().');
            if (state.status === 'idle' || state.status === 'question_ready' || state.status === 'transition_next') {
              emit('GAME_START', { state: getPublicState() });
              startIndicator();
              if (!rafId) rafId = requestAnimationFrame(tick);
            }
            return this;
          },
          restart() {
            destroyTimers();
            resetState();
            emit('GAME_RESTART', { state: getPublicState() });
            loadQuestion(0);
            render();
            this.start();
            return this;
          },
          destroy() {
            destroyTimers();
            audio.shutdown();
            if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
            else window.removeEventListener('resize', renderIndicator);
            if (rootEl && rootEl.parentNode) rootEl.parentNode.removeChild(rootEl);
            rootEl = null;
          },
          getState() { return getPublicState(); },
          setConfig(nextConfig = {}) {
            config = deepMerge(config, nextConfig);
            audio = createAudioManager(config);
            state.stepsToFinish = Number(config.gameplay.stepsToFinish || state.stepsToFinish);
            render();
            return this;
          },
          loadQuestions(nextQuestions = []) {
            validateQuestions(nextQuestions, config.gameplay.maxAnswerLength);
            questions = nextQuestions.map((q) => ({ ...q, answers: q.answers.slice() }));
            resetState();
            loadQuestion(0);
            render();
            return this;
          }
        };

        return api;
      }

      window.MomentOfTruth = createGame();

      const demoConfig = {
        gameplay: {
          lives: 3,
          stepsToFinish: 6,
          maxAnswerLength: 40,
          scoreCountDurationMs: 1100
        },
        movement: {
          movementType: 'pingpong',
          minStopDelayMs: 800,
          defaultSpeed: 320,
          indicatorType: 'runner'
        },
        bonuses: {
          freezeDurationMs: 10000,
          energyEnabled: true,
          energyMax: 100,
          freezeCost: 100,
          fiftyCost: 60,
          energyGainCorrect: 30,
          energyGainPerfect: 20,
          energyLossWrong: 20
        },
        perfect: {
          enabled: true,
          thresholdRatio: 0.12,
          text: 'PERFECT!'
        },
        audio: { enabled: true, volume: 0.05 }
      };

      const demoQuestions = DEFAULT_QUESTIONS;

      document.addEventListener('DOMContentLoaded', function () {
        window.MomentOfTruth.init(demoConfig, demoQuestions, '#moment-of-truth-root').start();
      });
    })();
  </script>
</body>
</html>
